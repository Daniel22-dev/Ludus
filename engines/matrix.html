<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Detektivka · LUDUS</title>
<!--
  LUDUS ENGINE — typ: DETEKTIVKA (vyšetřování → důkazy → obvinění)
  Skin: Matrix (interní "originál") ↔ Simulakrum / The Simulacrum Case (bezpečná, default)
  Kontrakt: čte window.LUDUS_CONTENT (v2, schema 2); fallback window.GAME_CONTENT (v1); fallback vestavěný SAMPLE.
  Typy úloh (klíče se NIKDY nepřejmenovávají): mc4, mc2, yesno, wordbank, classify
  Obrázky: window.LUDUS_IMAGES {hero, creature, roomBg} — interop s ostatními enginy.
  Standalone, offline, bez závislostí, systémové fonty, UTF-8.
  Re-injekce z builderu: window.LUDUS_LOAD(content) přepíše obsah a restartuje.
  Učitel: trojklik na logo LUDUS nebo ?teacher=1.
  Revize 07/2026: oprava ztráty uloženého postupu při bootu (setSound → saveState),
  escapování dešifrovací animace, opravená breathe animace odhalení, razítko na výsledkové
  kartě, barevná známka, vyhodnocení wordbank/classify po položkách, boot řádky intra,
  funkční holdMs, pulz počítadla důkazů, aria-live, dynamický titulek.
-->
<style>
/* =========================================================================
   PROMĚNNÉ / SKINY
   ========================================================================= */
:root{
  --bg:#0b1020; --bg2:#141b30; --panel:#161d33; --ink:#e7ecff; --muted:#8b93b8;
  --acc:#ffb454; --acc2:#38e0d8; --danger:#ff5d73; --ok:#4be08b;
  --line:#243049; --glow:rgba(56,224,216,.32); --tab:#1d2742;
  --rain:rgba(56,224,216,.0); /* v bezpečné verzi déšť skoro neviditelný */
  --string:#ff5d73;
  --mono:ui-monospace,"SFMono-Regular","Cascadia Code","JetBrains Mono",Consolas,"Liberation Mono",monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
body[data-skin="orig"]{
  --bg:#000400; --bg2:#04110a; --panel:#05130b; --ink:#c9ffd8; --muted:#3f9c5e;
  --acc:#00ff66; --acc2:#1cffa0; --danger:#ff2d4a; --ok:#00ff66;
  --line:#0c3a21; --glow:rgba(0,255,102,.40); --tab:#062a17;
  --rain:rgba(0,255,102,.85);
  --string:#00ff66;
}

/* =========================================================================
   RESET / ZÁKLAD
   ========================================================================= */
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overflow-x:hidden; line-height:1.5; transition:background .5s ease, color .5s ease;
}
button{font-family:inherit}
:focus-visible{outline:2px solid var(--acc2); outline-offset:2px; border-radius:6px}
::selection{background:var(--acc); color:#000}

/* =========================================================================
   ATMOSFÉRICKÉ VRSTVY
   ========================================================================= */
#fx{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden}
#rain{position:absolute; inset:0; width:100%; height:100%; opacity:.0; transition:opacity .8s ease}
body[data-skin="orig"] #rain{opacity:.9}
body[data-skin="safe"] #rain{opacity:.35}
.scan{position:absolute; inset:0; background:repeating-linear-gradient(0deg,
  rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,.22) 3px, rgba(0,0,0,0) 4px);
  mix-blend-mode:multiply; opacity:.5; animation:scanmove 8s linear infinite}
.grain{position:absolute; inset:-50%; opacity:.05; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  animation:grain 1.2s steps(4) infinite}
.vignette{position:absolute; inset:0; background:radial-gradient(120% 90% at 50% 35%,
  rgba(0,0,0,0) 40%, rgba(0,0,0,.62) 100%)}
.glowtop{position:absolute; top:-20%; left:50%; transform:translateX(-50%);
  width:80vw; height:50vh; background:radial-gradient(closest-side, var(--glow), transparent 70%);
  filter:blur(20px); opacity:.7}
@keyframes scanmove{to{background-position:0 8px}}
@keyframes grain{0%{transform:translate(0,0)}100%{transform:translate(-6%,4%)}}

/* =========================================================================
   TOPBAR
   ========================================================================= */
.topbar{position:fixed; top:0; left:0; right:0; height:48px; z-index:30;
  display:flex; align-items:center; gap:8px; padding:0 12px;
  background:linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.0));
  backdrop-filter:blur(6px)}
.brand{display:flex; align-items:center; gap:9px; font-family:var(--mono);
  font-size:13px; letter-spacing:.14em; color:var(--ink); cursor:pointer;
  user-select:none; padding:6px 4px; text-transform:uppercase}
.brand .dot{width:10px; height:10px; border-radius:50%; background:var(--acc2);
  box-shadow:0 0 10px var(--acc2); animation:pulse 2.2s ease-in-out infinite}
.brand b{color:var(--acc); font-weight:700}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.spacer{flex:1}
.iconbtn{height:34px; min-width:34px; padding:0 9px; border:1px solid var(--line);
  background:rgba(255,255,255,.03); color:var(--ink); border-radius:9px;
  font-family:var(--mono); font-size:12px; letter-spacing:.06em; cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  transition:border-color .2s, background .2s}
.iconbtn:hover{border-color:var(--acc2); background:rgba(255,255,255,.06)}
.iconbtn.live{border-color:var(--acc); color:var(--acc)}
#btnBoard{display:none}
#btnBoard.show{display:inline-flex}
#btnBoard .ct{display:inline-block; min-width:18px; padding:0 5px; border-radius:20px;
  background:var(--acc); color:#000; font-weight:700; font-size:11px}
#btnBoard .ct.pop{animation:ctpop .5s cubic-bezier(.2,1.6,.4,1)}
@keyframes ctpop{0%{transform:scale(1)}45%{transform:scale(1.55)}100%{transform:scale(1)}}

/* =========================================================================
   UČITELSKÝ PRUH (skrytý před studenty)
   ========================================================================= */
#teacherBar{position:fixed; top:48px; left:0; right:0; z-index:29; display:none;
  flex-wrap:wrap; align-items:center; gap:8px; padding:8px 12px;
  background:linear-gradient(180deg, rgba(120,30,40,.30), rgba(120,30,40,.06));
  border-bottom:1px solid var(--line); backdrop-filter:blur(6px)}
#teacherBar.show{display:flex}
#teacherBar .tlabel{font-family:var(--mono); font-size:11px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--danger)}
#teacherBar select,#teacherBar .tbtn{height:30px; border:1px solid var(--line);
  background:var(--bg2); color:var(--ink); border-radius:7px; font-family:var(--mono);
  font-size:12px; padding:0 8px; cursor:pointer}
#teacherBar .tbtn:hover{border-color:var(--danger)}

/* =========================================================================
   HERNÍ PLOCHA
   ========================================================================= */
#screen{position:relative; z-index:10; max-width:760px; margin:0 auto;
  padding:74px 16px 40px; min-height:100vh; display:flex; flex-direction:column}
.fade{animation:fade .45s ease both}
@keyframes fade{from{opacity:0; transform:translateY(10px)}to{opacity:1; transform:none}}

/* karta / panel ve stylu spisu */
.panel{position:relative; background:linear-gradient(180deg, var(--panel), var(--bg2));
  border:1px solid var(--line); border-radius:14px; padding:20px 18px 18px;
  box-shadow:0 18px 50px rgba(0,0,0,.45)}
.panel.tabbed{margin-top:18px}
.filetab{position:absolute; top:-15px; left:16px; height:26px; padding:0 12px;
  display:inline-flex; align-items:center; gap:8px; background:var(--tab);
  border:1px solid var(--line); border-bottom:none; border-radius:8px 8px 0 0;
  font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--acc)}
.filetab::before{content:""; width:7px; height:7px; border-radius:2px; background:var(--acc);
  box-shadow:0 0 8px var(--acc)}

.eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:.22em; text-transform:uppercase;
  color:var(--acc2); margin:0 0 6px}
h1.title{font-size:clamp(26px,7vw,44px); line-height:1.04; margin:0 0 6px; font-weight:800;
  letter-spacing:-.01em}
h2.scene{font-size:clamp(19px,5vw,26px); margin:2px 0 4px; font-weight:800}
.lead{color:var(--muted); margin:6px 0 0; font-size:15px}
.mono{font-family:var(--mono)}

/* =========================================================================
   HRDINSKÁ SCÉNA (úvod)
   ========================================================================= */
.hero{position:relative; border-radius:16px; overflow:hidden; border:1px solid var(--line);
  aspect-ratio:16/10; background:#000; margin-top:8px}
.hero .art,.hero .photo{position:absolute; inset:0; width:100%; height:100%}
.hero .photo{object-fit:cover; display:none; transform:scale(1.06); animation:kenburns 18s ease-in-out infinite alternate}
.hero.has-photo .photo{display:block}
.hero.has-photo .art{display:none}
.hero .grad{position:absolute; inset:0; background:linear-gradient(180deg,
  rgba(0,0,0,.05), rgba(0,0,0,.15) 55%, rgba(0,0,0,.85)); z-index:2}
.hero .cap{position:absolute; left:16px; right:16px; bottom:14px; z-index:3}
@keyframes kenburns{from{transform:scale(1.04) translate(0,0)}to{transform:scale(1.14) translate(-2%,-2%)}}

.namewrap{margin-top:16px}
.lbl{display:block; font-family:var(--mono); font-size:11px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--muted); margin:0 0 6px}
.field{width:100%; height:48px; padding:0 14px; background:var(--bg); color:var(--ink);
  border:1px solid var(--line); border-radius:11px; font-size:16px; font-family:var(--sans)}
.field:focus{border-color:var(--acc2)}

/* =========================================================================
   TLAČÍTKA
   ========================================================================= */
.btn{appearance:none; border:1px solid var(--acc); background:transparent; color:var(--acc);
  font-family:var(--mono); font-size:14px; letter-spacing:.06em; padding:13px 18px;
  border-radius:11px; cursor:pointer; display:inline-flex; align-items:center; gap:9px;
  transition:transform .12s, box-shadow .25s, background .2s; text-transform:uppercase}
.btn::before{content:"▸"; color:var(--acc); transition:transform .2s}
.btn:hover{background:color-mix(in srgb, var(--acc) 12%, transparent); box-shadow:0 0 22px var(--glow)}
.btn:hover::before{transform:translateX(3px)}
.btn:active{transform:translateY(1px)}
.btn.solid{background:var(--acc); color:#000; font-weight:700}
.btn.solid::before{color:#000}
.btn.ghost{border-color:var(--line); color:var(--ink)}
.btn.ghost::before{content:none}
.btn.block{width:100%; justify-content:center; padding:15px}
.btn.lg{font-size:15px; padding:16px 22px}
.btn[disabled]{opacity:.4; cursor:not-allowed; box-shadow:none}
.btnrow{display:flex; gap:10px; flex-wrap:wrap; margin-top:16px}

/* =========================================================================
   PRŮBĚH / KROKY
   ========================================================================= */
.prog{display:flex; align-items:center; gap:10px; margin:2px 0 0}
.prog .bar{flex:1; height:6px; background:var(--line); border-radius:20px; overflow:hidden}
.prog .bar i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--acc2),var(--acc));
  border-radius:20px; transition:width .5s ease; box-shadow:0 0 10px var(--glow)}
.prog .pct{font-family:var(--mono); font-size:12px; color:var(--muted); min-width:64px; text-align:right}

/* =========================================================================
   ÚLOHY
   ========================================================================= */
.qhead{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:4px}
.qnum{font-family:var(--mono); font-size:12px; letter-spacing:.1em; color:var(--acc2)}
.qtext{font-size:clamp(17px,4.4vw,21px); font-weight:700; margin:8px 0 16px; line-height:1.35}
.opts{display:grid; gap:10px}
.opt{display:flex; align-items:center; gap:12px; padding:14px 14px; border:1px solid var(--line);
  background:var(--bg2); border-radius:12px; cursor:pointer; font-size:16px; text-align:left;
  transition:border-color .15s, background .15s, transform .1s; color:var(--ink)}
.opt:hover{border-color:var(--acc2); background:rgba(255,255,255,.03)}
.opt:active{transform:scale(.995)}
.opt .key{flex:none; width:28px; height:28px; border-radius:7px; display:grid; place-items:center;
  font-family:var(--mono); font-size:13px; background:var(--bg); border:1px solid var(--line); color:var(--muted)}
.opt.correct{border-color:var(--ok); background:color-mix(in srgb,var(--ok) 14%, transparent)}
.opt.correct .key{background:var(--ok); color:#000; border-color:var(--ok)}
.opt.wrong{border-color:var(--danger); background:color-mix(in srgb,var(--danger) 14%, transparent)}
.opt.wrong .key{background:var(--danger); color:#000; border-color:var(--danger)}
.opt.lock{pointer-events:none; opacity:.85}

/* wordbank */
.assemble{min-height:54px; border:1px dashed var(--line); border-radius:12px; padding:10px;
  display:flex; flex-wrap:wrap; gap:8px; background:var(--bg); margin-bottom:12px}
.assemble:empty::before{content:attr(data-ph); color:var(--muted); font-size:14px; font-family:var(--mono)}
.bank{display:flex; flex-wrap:wrap; gap:8px}
.tile{padding:9px 13px; border:1px solid var(--line); background:var(--bg2); border-radius:9px;
  cursor:pointer; font-size:15px; transition:transform .1s, border-color .15s; color:var(--ink)}
.tile:hover{border-color:var(--acc2)}
.tile:active{transform:scale(.96)}
.tile.used{opacity:.25; pointer-events:none}
.assemble .tile{border-color:var(--acc2)}
.assemble .tile.good{border-color:var(--ok); color:var(--ok); opacity:1}
.assemble .tile.bad{border-color:var(--danger); color:var(--danger); opacity:1}

/* classify */
.cols{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.col{border:1px solid var(--line); border-radius:12px; background:var(--bg); padding:10px; min-height:90px}
.col h4{margin:0 0 8px; font-family:var(--mono); font-size:12px; letter-spacing:.08em;
  text-transform:uppercase; color:var(--acc2); text-align:center}
.col .drop{display:flex; flex-direction:column; gap:7px; min-height:50px}
.pool{display:flex; flex-wrap:wrap; gap:8px; margin-top:12px}
.chip{padding:9px 12px; border:1px solid var(--line); background:var(--bg2); border-radius:9px;
  cursor:pointer; font-size:14px; color:var(--ink); transition:border-color .15s, transform .1s}
.chip:hover{border-color:var(--acc2)} .chip:active{transform:scale(.96)}
.chip.placed{width:100%; text-align:center}
.chip.good{border-color:var(--ok); color:var(--ok)}
.chip.bad{border-color:var(--danger); color:var(--danger)}

/* feedback */
.fb{margin-top:14px; padding:12px 14px; border-radius:11px; font-size:14px; display:none;
  border:1px solid var(--line); background:var(--bg)}
.fb.show{display:block; animation:fade .3s both}
.fb.good{border-color:var(--ok); color:var(--ok)}
.fb.bad{border-color:var(--danger); color:var(--danger)}
.fb b{font-family:var(--mono)}

/* =========================================================================
   DŮKAZ — odhalení (PODPISOVÝ PRVEK: dešifrování / psací stroj)
   ========================================================================= */
.cluepop{margin-top:16px; border:1px solid var(--acc2); border-radius:12px; overflow:hidden;
  background:linear-gradient(180deg, color-mix(in srgb,var(--acc2) 8%, var(--bg2)), var(--bg2));
  display:none}
.cluepop.show{display:block; animation:cluein .5s both}
@keyframes cluein{from{opacity:0; transform:translateY(8px) scale(.98)}to{opacity:1; transform:none}}
.cluepop .ch{display:flex; align-items:center; gap:9px; padding:9px 12px;
  border-bottom:1px solid var(--line); font-family:var(--mono); font-size:11px;
  letter-spacing:.14em; text-transform:uppercase; color:var(--acc2)}
.cluepop .ch .pin{width:9px; height:9px; border-radius:50%; background:var(--string);
  box-shadow:0 0 9px var(--string)}
.cluepop .cb{padding:13px 14px; font-size:15px; min-height:24px}
.cluepop .cb .cur{color:var(--acc2)}

/* =========================================================================
   DŮKAZNÍ TABULE (modal)
   ========================================================================= */
.modal{position:fixed; inset:0; z-index:60; display:none; align-items:flex-end; justify-content:center;
  background:rgba(0,0,0,.6); backdrop-filter:blur(4px)}
.modal.show{display:flex; animation:fade .25s both}
.sheet{width:100%; max-width:760px; max-height:86vh; overflow:auto; background:var(--bg2);
  border:1px solid var(--line); border-radius:18px 18px 0 0; padding:18px 16px 26px}
.sheet .sh{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px}
.sheet h3{margin:0; font-size:18px; font-family:var(--mono); letter-spacing:.08em; text-transform:uppercase}
.board{position:relative; margin-top:12px; display:grid; grid-template-columns:1fr 1fr; gap:12px}
.note{position:relative; border:1px solid var(--line); border-radius:10px; padding:12px;
  background:linear-gradient(180deg,var(--panel),var(--bg)); box-shadow:0 8px 22px rgba(0,0,0,.4)}
.note::before{content:""; position:absolute; top:-6px; left:50%; transform:translateX(-50%);
  width:11px; height:11px; border-radius:50%; background:var(--string); box-shadow:0 0 10px var(--string)}
.note .nlabel{font-family:var(--mono); font-size:10px; letter-spacing:.12em; color:var(--acc2);
  text-transform:uppercase; margin-bottom:5px}
.note p{margin:0; font-size:14px}
.board .empty{grid-column:1/-1; text-align:center; color:var(--muted); font-family:var(--mono);
  font-size:13px; padding:24px 0}

/* =========================================================================
   OBVINĚNÍ (finále = "zámek")
   ========================================================================= */
.suspects{display:grid; gap:12px; margin-top:14px}
@media(min-width:560px){.suspects{grid-template-columns:1fr 1fr}}
.suspect{display:flex; gap:12px; align-items:center; padding:13px; border:1px solid var(--line);
  border-radius:13px; background:var(--bg2); cursor:pointer; transition:border-color .15s, transform .1s}
.suspect:hover{border-color:var(--acc)} .suspect:active{transform:scale(.99)}
.suspect.sel{border-color:var(--acc); box-shadow:0 0 18px var(--glow)}
.suspect .av{flex:none; width:46px; height:46px; border-radius:10px; background:var(--bg);
  border:1px solid var(--line); display:grid; place-items:center; overflow:hidden}
.suspect .av svg{width:100%; height:100%}
.suspect .nm{font-weight:700; font-size:16px}
.suspect .ds{font-size:13px; color:var(--muted)}

/* odhalení pachatele / antagonista */
.reveal{position:relative; border-radius:16px; overflow:hidden; border:1px solid var(--line);
  aspect-ratio:16/11; background:#000; margin-top:6px}
.reveal .art,.reveal .photo{position:absolute; inset:0; width:100%; height:100%}
.reveal .photo{object-fit:cover; display:none}
.reveal.has-photo .photo{display:block; will-change:filter,transform,clip-path;
  animation:emerge 2.3s cubic-bezier(.2,.7,.2,1) both, breathe 5s ease-in-out 2.3s infinite}
.reveal.has-photo .art{display:none}
.reveal.win{border-color:color-mix(in srgb,var(--ok) 55%, var(--line));
  box-shadow:0 0 34px color-mix(in srgb,var(--ok) 30%, transparent)}
.reveal.lose{border-color:color-mix(in srgb,var(--danger) 55%, var(--line));
  box-shadow:0 0 34px color-mix(in srgb,var(--danger) 28%, transparent)}
/* fotka pachatele se zhmotní z dat: řezy + chromatická aberace, která se zaostří */
@keyframes emerge{
  0%{ clip-path:inset(46% 0 46% 0); transform:scale(1.22);
      filter:brightness(.08) contrast(2.2) blur(9px) drop-shadow(4px 0 0 #ff00d4) drop-shadow(-4px 0 0 #00fff2); }
  14%{ clip-path:inset(2% 0 70% 0); transform:scale(1.18) translateX(-1.5%);
      filter:brightness(1.7) contrast(1.5) blur(3px) drop-shadow(5px 0 0 #ff00d4) drop-shadow(-5px 0 0 #00fff2); }
  30%{ clip-path:inset(62% 0 8% 0); transform:scale(1.14) translateX(2%); filter:brightness(.9) contrast(1.4) blur(2px); }
  46%{ clip-path:inset(24% 0 30% 0); transform:scale(1.12) translateX(-1%);
      filter:brightness(1.15) contrast(1.25) blur(1.5px) drop-shadow(2px 0 0 #ff00d4) drop-shadow(-2px 0 0 #00fff2); }
  64%{ clip-path:inset(0 0 0 0); transform:scale(1.08); filter:brightness(1.05) contrast(1.1) blur(.5px); }
  100%{ clip-path:inset(0 0 0 0); transform:scale(1.04); filter:none; }
}
/* SVG fallback antagonista – také dramatický nástup */
.reveal .art{animation:artin 1.5s cubic-bezier(.2,.7,.2,1) both}
@keyframes artin{0%{opacity:0; transform:scale(1.12); filter:blur(12px) brightness(2.2)}
  60%{opacity:1; filter:blur(1px) brightness(1.2)} 100%{opacity:1; transform:scale(1); filter:none}}
.reveal .grad{position:absolute; inset:0; z-index:2;
  background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.2) 60%,rgba(0,0,0,.9))}
/* CRT sken přes odhalení + jeden dešifrovací průlet */
.reveal::after{content:""; position:absolute; inset:0; z-index:2; pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,.16) 3px, rgba(0,0,0,0) 4px);
  mix-blend-mode:overlay; opacity:.5}
.reveal::before{content:""; position:absolute; left:0; right:0; height:32%; z-index:3; pointer-events:none;
  background:linear-gradient(180deg, rgba(120,255,170,0), rgba(120,255,170,.28), rgba(120,255,170,0));
  filter:blur(2px); animation:decryptsweep 2.3s ease-in-out both}

#splash{position:fixed; inset:0; z-index:80; display:flex;

/* ===========================================================================
   ROZLIŠENÍ OBSAHU — permisivní normalizér (akceptuje aliasy polí)
   =========================================================================== */
function L(v, lang){ // lokalizace hodnoty (string | {cs,en})
  if(v==null) return "";
  if(typeof v==="string") return v;
  if(typeof v==="object") return v[lang] || v.cs || v.en || Object.values(v)[0] || "";
  return String(v);
}
const TYPE_ALIAS={mc4:"mc4",multi4:"mc4",abcd:"mc4",choice4:"mc4",
  mc2:"mc2",duo:"mc2",choice2:"mc2",either:"mc2",
  yesno:"yesno",tf:"yesno",truefalse:"yesno",boolean:"yesno",bool:"yesno",
  wordbank:"wordbank",order:"wordbank",assemble:"wordbank",reorder:"wordbank",sentence:"wordbank",
  classify:"classify",sort:"classify",categorize:"classify",group:"classify",bucket:"classify"};

function normalizeExercise(x){
  const t=TYPE_ALIAS[(x.type||x.kind||"").toLowerCase()]||"mc4";
  const e={type:t, q:(x.q||x.question||x.text||x.prompt||""), clue:(x.clue||x.evidence||x.note||null)};
  if(t==="mc4"||t==="mc2"){
    e.opts=(x.opts||x.options||x.choices||x.answers||[]).slice();
    let a=(x.answer!=null?x.answer:(x.correct!=null?x.correct:x.a));
    if(typeof a==="string"){ const i=e.opts.indexOf(a); e.answer=i>=0?i:0; }
    else e.answer=(a|0)||0;
    if(t==="mc2"&&e.opts.length<2) e.opts=["A","B"];
    if(t==="mc4"&&e.opts.length<2) e.opts=["A","B","C","D"];
  } else if(t==="yesno"){
    let a=(x.answer!=null?x.answer:(x.correct!=null?x.correct:x.a));
    if(typeof a==="string") a=/^(y|yes|ano|true|t|1)$/i.test(a.trim());
    e.answer=!!a;
  } else if(t==="wordbank"){
    e.answer=(x.answer||x.solution||x.words||[]).slice();
    e.extra=(x.extra||x.distractors||x.decoys||[]).slice();
  } else if(t==="classify"){
    e.cats=(x.cats||x.categories||x.groups||["A","B"]).slice();
    let items=(x.items||x.cards||[]);
    e.items=items.map(it=>({t:(it.t||it.text||it.label||""),
      c:(typeof it.c==="number"?it.c:(typeof it.cat==="number"?it.cat:(e.cats.indexOf(it.cat)>=0?e.cats.indexOf(it.cat):0)))}));
  }
  return e;
}
function normalizeContent(raw){
  const r=raw||{};
  const meta=r.meta||{};
  const roomsRaw=r.rooms||r.scenes||r.levels||r.stages||[];
  const scenes=roomsRaw.map((s,i)=>({
    id:s.id||("scene"+(i+1)),
    name:(s.name||s.title||{cs:"Scéna "+(i+1),en:"Scene "+(i+1)}),
    intro:(s.intro||s.brief||s.desc||null),
    exercises:(s.exercises||s.tasks||s.questions||s.items||[]).map(normalizeExercise)
  })).filter(s=>s.exercises.length);
  const suspectsRaw=r.suspects||r.people||r.persons||[];
  const suspects=suspectsRaw.map((p,i)=>({
    id:p.id||("s"+i), name:(p.name||{cs:"Podezřelý "+(i+1),en:"Suspect "+(i+1)}),
    desc:(p.desc||p.description||""), av:(p.av||p.avatar||["guard","scientist","intern","admin"][i%4])
  }));
  const sol=r.solution||r.answer||{};
  const culprit=sol.culprit||sol.culpritId||sol.id||sol.answer||(suspects.length?suspects[suspects.length-1].id:null);
  return {meta, scenes, suspects, solution:{culprit, explain:(sol.explain||sol.reason||null)}};
}

   =========================================================================== */
let AC=null;
function ensureAudio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(AC&&AC.state==="suspended") AC.resume(); }
function tone(f,t,dur,gain,type){ if(!S.sound||!AC) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||"sine"; o.frequency.setValueAtTime(f, t);
  g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(gain||.18, t+.012);
  g.gain.exponentialRampToValueAtTime(.0001, t+dur);
  o.connect(g).connect(AC.destination); o.start(t); o.stop(t+dur+.02); }
function sfx(kind){ if(!S.sound) return; ensureAudio(); if(!AC) return; const n=AC.currentTime;
  if(kind==="click"){ tone(420,n,.06,.10,"square"); }
  else if(kind==="correct"){ [523,659,784].forEach((f,i)=>tone(f,n+i*.07,.18,.16,"triangle")); }
  else if(kind==="wrong"){ tone(150,n,.22,.18,"sawtooth"); tone(110,n+.05,.26,.14,"sawtooth"); }
  else if(kind==="clue"){ [880,1175,1568].forEach((f,i)=>tone(f,n+i*.05,.5,.07,"sine")); }
  else if(kind==="reveal"){ tone(196,n,.9,.20,"sawtooth"); [392,494,587,784].forEach((f,i)=>tone(f,n+.12+i*.06,.7,.10,"triangle")); }
  else if(kind==="accuse"){ tone(330,n,.3,.16,"square"); tone(247,n+.12,.4,.14,"square"); }
}

function downscale(file, maxPx, cb){
  const img=new Image(), url=URL.createObjectURL(file);
  img.onload=()=>{ let {width:w,height:h}=img; const s=Math.min(1, maxPx/Math.max(w,h));
    w=Math.round(w*s); h=Math.round(h*s); const c=document.createElement("canvas");
    c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url); cb(c.toDataURL("image/jpeg",0.82)); };
  img.onerror=()=>{ URL.revokeObjectURL(url); cb(null); }; img.src=url;
}
function pickImage(key, after){
  const inp=document.createElement("input"); inp.type="file"; inp.accept="image/*";
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f) return;
    downscale(f, 1280, data=>{ if(data){ IMAGES[key]=data; saveImages(); applyImages(); if(after) after(); } }); };
  inp.click();
}
function removeImage(key, after){ delete IMAGES[key]; saveImages(); applyImages(); if(after) after(); }

/* aplikace: img[data-key] dostane src; .scenebg[data-key] dostane background */
function applyImages(root){
  (root||document).querySelectorAll("[data-key]").forEach(node=>{
    const data=imgFor(node.getAttribute("data-key"));
    if(node.tagName==="IMG"){ const host=node.closest(".hero,.reveal,.av");
      if(data){ node.src=data; host&&host.classList.add("has-photo"); }
      else { node.removeAttribute("src"); host&&host.classList.remove("has-photo"); } }
    else { if(data){ node.style.backgroundImage="url("+data+")"; node.classList.add("on"); }
      else { node.style.backgroundImage=""; node.classList.remove("on"); } }
  });
}

/* ===========================================================================
   DÉŠŤ KÓDU (canvas) — prémiový "digital rain"
   • DPR-aware, delta-time (plynulé na 60/90/120 Hz)
   • per-sloupcové proudy: proměnná rychlost, hloubka, mutace glyfů
   • zářící bílé hlavy (glow) + svítící zelené stopy s motion-blur
   • bezpečná verze: jemný, řidší kyanový drift
   • cached barvy/font (žádné čtení stylů ve smyčce)
   • respektuje prefers-reduced-motion (statické pole)
   =========================================================================== */
const Rain=(function(){
  let cv,ctx,raf,W=0,H=0,DPR=1,fs=16,cols=0,reduced=false;
  let headY=[],speed=[],headCh=[],depth=[],lastT=0;
  let glyphs="01",fontStr="16px monospace";
  let colMain="0,255,102",colHead="#caffd6",glowCol="rgba(0,255,120,.9)",fadeA=0.085,baseSpeed=1.15,density=1,depthMin=0.55;
  const rnd=()=>glyphs[(Math.random()*glyphs.length)|0];

  function setup(){ cv=document.getElementById("rain"); if(!cv) return; ctx=cv.getContext("2d");
    reduced=matchMedia("(prefers-reduced-motion:reduce)").matches; resize(); }
  function resize(){ if(!cv||!ctx) return;
    DPR=Math.min(2, window.devicePixelRatio||1); W=innerWidth; H=innerHeight;
    cv.width=Math.floor(W*DPR); cv.height=Math.floor(H*DPR);
    cv.style.width=W+"px"; cv.style.height=H+"px"; ctx.setTransform(DPR,0,0,DPR,0,0);
    fs=Math.max(14, Math.round(W/54)); cols=Math.ceil(W/fs)+1; fontStr=fs+"px "+monoFont();
    initStreams(); ctx.clearRect(0,0,W,H); ctx.fillStyle="#000"; ctx.fillRect(0,0,W,H);
    if(reduced) staticField(); }
  function monoFont(){ const f=getComputedStyle(document.body).getPropertyValue("--mono"); return (f&&f.trim())||"ui-monospace,monospace"; }
  function initStreams(){ headY=new Array(cols); speed=new Array(cols); headCh=new Array(cols); depth=new Array(cols);
    for(let i=0;i<cols;i++){ headY[i]=Math.random()*-(H/fs)*1.5; speed[i]=baseSpeed*(0.55+Math.random()*0.95);
      headCh[i]=rnd(); depth[i]=depthMin+Math.random()*(1-depthMin); } }

  function glyphSet(){ // přepočet stylů podle skinu (volá se i při přepnutí skinu)
    const sk=SKINS[S.skin]; glyphs=(sk&&sk.rainGlyphs)||"01";
    if(S.skin==="orig"){ colMain="0,255,102"; colHead="#d6ffe0"; glowCol="rgba(80,255,140,.95)";
      fadeA=0.085; baseSpeed=1.15; density=1; depthMin=0.5; }
    else { colMain="120,220,255"; colHead="#e9f8ff"; glowCol="rgba(140,225,255,.7)";
      fadeA=0.22; baseSpeed=0.5; density=0.5; depthMin=0.35; }
    if(ctx){ fontStr=fs+"px "+monoFont();
      for(let i=0;i<cols;i++){ speed[i]=baseSpeed*(0.55+Math.random()*0.95); depth[i]=depthMin+Math.random()*(1-depthMin); } }
  }

  function staticField(){ if(!ctx) return; ctx.clearRect(0,0,W,H); ctx.fillStyle="#000"; ctx.fillRect(0,0,W,H);
    ctx.font=fontStr; ctx.textBaseline="top";
    for(let i=0;i<cols;i++){ if(density<1 && (i&1)) continue;
      const n=2+((Math.random()*4)|0); for(let k=0;k<n;k++){ const y=(Math.random()*(H/fs))|0;
        ctx.fillStyle="rgba("+colMain+","+(0.18+Math.random()*0.22)+")"; ctx.fillText(rnd(), i*fs, y*fs); } } }

  function frame(t){ raf=requestAnimationFrame(frame);
    if(!lastT) lastT=t; let dt=(t-lastT)/16.67; lastT=t; if(dt>3) dt=3; if(dt<0.2) dt=0.2;
    // motion-blur stopa
    ctx.globalCompositeOperation="source-over"; ctx.globalAlpha=1;
    ctx.fillStyle="rgba(0,4,1,"+fadeA+")"; ctx.fillRect(0,0,W,H);
    ctx.font=fontStr; ctx.textBaseline="top";
    for(let i=0;i<cols;i++){ if(density<1 && (i&1)) continue;
      if(Math.random()<0.45) headCh[i]=rnd();
      const x=i*fs, y=headY[i]*fs, d=depth[i];
      const sparkle=Math.random()<0.05;
      ctx.globalAlpha=d;
      if(sparkle){ ctx.fillStyle=colHead; ctx.shadowColor=glowCol; ctx.shadowBlur=fs*0.7;
        ctx.fillText(headCh[i], x, y); ctx.shadowBlur=0; }
      else { ctx.fillStyle="rgba("+colMain+","+(0.92*d)+")"; ctx.fillText(headCh[i], x, y); }
      headY[i]+=speed[i]*dt;
      if(y>H && Math.random()>0.965){ headY[i]=Math.random()*-18; speed[i]=baseSpeed*(0.55+Math.random()*0.95); depth[i]=depthMin+Math.random()*(1-depthMin); }
    }
    ctx.globalAlpha=1;
  }
  function start(){ if(!cv||!ctx) return; glyphSet(); cancelAnimationFrame(raf);
    if(reduced){ staticField(); return; } lastT=0; raf=requestAnimationFrame(frame); }
  return { setup, resize, start, glyphSet };
})();

/* ===========================================================================
   PODPISOVÁ ANIMACE — dešifrování (Matrix) / psací stroj (bezpečná verze)
   =========================================================================== */
function revealText(el, text, done){
  const reduced=matchMedia("(prefers-reduced-motion:reduce)").matches;
  if(reduced || !text){ el.textContent=text; done&&done(); return; }
  if(S.skin==="orig"){ // scramble → resolve
    const glyphs="ｱｲｳ01<>/\\|=+*ﾊﾐﾋ", N=text.length; let frame=0;
    clearInterval(el._iv);
    el._iv=setInterval(()=>{ let out="";
      for(let i=0;i<N;i++){ if(i<frame/2) out+=esc(text[i]);
        else if(text[i]===" ") out+=" ";
        else out+="<span class='cur'>"+esc(glyphs[(Math.random()*glyphs.length)|0])+"</span>"; }
      el.innerHTML=out; frame++; if(frame/2>=N){ clearInterval(el._iv); el.textContent=text; done&&done(); }
    }, 24);
  } else { // typewriter
    let i=0; el.textContent=""; clearInterval(el._iv);
    el._iv=setInterval(()=>{ el.textContent=text.slice(0,++i)+(i<text.length?"▍":"");
      if(i>=text.length){ clearInterval(el._iv); el.textContent=text; done&&done(); } }, 18);
  }
}

function renderScene(){
  updateBoardBtn();

  const ex=scene.exercises[S.exIdx]; if(!ex){ S.sceneIdx++; S.exIdx=0; saveState(); return renderScene(); }
  const pos=positionIndex()+1, total=S.max, pct=Math.round((positionIndex())/total*100);
  const sceneName=L(scene.name,S.lang);
  const node=elFrom(`<section>
    <div class="prog"><span class="qnum">${esc(txt("scene"))} ${S.sceneIdx+1}/${CONTENT.scenes.length}</span>
      <span class="bar"><i id="pbar"></i></span><span class="pct">${pos}/${total}</span></div>
    <div class="panel tabbed" style="margin-top:22px">
      <span class="filetab">${esc(txt("caseFile"))} · ${String(S.sceneIdx+1).padStart(2,"0")}</span>
      <h2 class="scene" id="sceneName"></h2>
      ${S.exIdx===0&&scene.intro?`<p class="lead" style="margin-top:2px">${esc(L(scene.intro,S.lang))}</p>`:""}
      <div class="divider"></div>
      <div id="exHost"></div>
      <div class="cluepop" id="cluePop" role="status" aria-live="polite"><div class="ch"><span class="pin"></span><span>${esc(txt("clue"))}</span></div><div class="cb" id="clueBody"></div></div>
      <div class="fb" id="fb" role="status" aria-live="polite"></div>
      <div class="btnrow" id="afterRow" style="display:none">
        <button class="btn solid" id="nextBtn">${esc(txt("next"))}</button>
      </div>
    </div>
  </section>`);
  setScreen(node); applyImages();
  setSceneBackdrop("scene:"+scene.id);
  requestAnimationFrame(()=>{ $("pbar").style.width=pct+"%"; revealText($("sceneName"), sceneName); });
  renderExercise(ex, scene);
}

function lockAndAdvance(correct, your, right, ex){
  S.answers.push({scene:S.sceneIdx, ex:S.exIdx, type:ex.type, q:L(ex.q,S.lang),
    correct:!!correct, your:your, right:right});
  const fb=$("fb"); fb.className="fb show "+(correct?"good":"bad");
  fb.innerHTML = correct ? `✓ <b>${esc(txt("correctAns"))}.</b>` : `✕ <b>${esc(txt("correctAns"))}:</b> ${esc(right)}`;
  sfx(correct?"correct":"wrong");
  if(correct && ex.clue){ secureClue(ex.clue); }
  $("afterRow").style.display="flex"; $("pbar").style.width=Math.round((positionIndex()+1)/S.max*100)+"%";
  $("nextBtn").onclick=()=>{ sfx("click"); advance(); };
  saveState(); updateBoardBtn();
}
function secureClue(clue){
  const label=`${L(skin().place,S.lang)} · ${String(S.clues.length+1).padStart(2,"0")}`;
  const text=L(clue,S.lang);
  S.clues.push({label, text});
  const pop=$("cluePop"); pop.classList.add("show"); sfx("clue");
  revealText($("clueBody"), text);
  const ct=$("boardCount"); ct.textContent=S.clues.length;
  ct.classList.remove("pop"); void ct.offsetWidth; ct.classList.add("pop");
}
function advance(){
  const scene=CONTENT.scenes[S.sceneIdx];
  S.exIdx++;
  if(S.exIdx>=scene.exercises.length){ S.sceneIdx++; S.exIdx=0; }
  saveState();
  if(S.sceneIdx>=CONTENT.scenes.length) renderAccusation();
  else renderScene();
}

/* -------- dispatch + renderery jednotlivých typů -------- */
function renderExercise(ex, scene){
  const host=$("exHost");
  host.innerHTML=`<div class="qhead"><span class="qnum">${esc(txt("evidence"))} ${positionIndex()+1}</span></div>
    <div class="qtext">${esc(L(ex.q,S.lang))}</div><div id="ui"></div>`;
  const ui=$("ui"); const T=ex.type;
  if(T==="mc4"||T==="mc2") renderMC(ui, ex);
  else if(T==="yesno") renderYesNo(ui, ex);
  else if(T==="wordbank") renderWordbank(ui, ex);
  else if(T==="classify") renderClassify(ui, ex);
  if(window.__TEACHER) injectSkip(ex);
}
function renderMC(ui, ex){
  const keys="ABCD"; ui.className="opts";
  ex.opts.forEach((o,i)=>{
    const b=elFrom(`<button class="opt"><span class="key">${keys[i]||i+1}</span><span>${esc(L(o,S.lang))}</span></button>`);
    b.addEventListener("click",()=>{
      ui.querySelectorAll(".opt").forEach(x=>x.classList.add("lock"));
      const correct=(i===ex.answer);
      b.classList.add(correct?"correct":"wrong");
      if(!correct){ const cb=ui.querySelectorAll(".opt")[ex.answer]; cb&&cb.classList.add("correct"); }
      lockAndAdvance(correct, L(ex.opts[i],S.lang), L(ex.opts[ex.answer],S.lang), ex);
    });
    ui.appendChild(b);
  });
}
function renderYesNo(ui, ex){
  ui.className="opts";
  const labels=[{v:true,t:txt("yes")},{v:false,t:txt("no")}];
  labels.forEach((o,i)=>{
    const b=elFrom(`<button class="opt"><span class="key">${o.v?"✓":"✕"}</span><span>${esc(o.t)}</span></button>`);
    b.addEventListener("click",()=>{
      ui.querySelectorAll(".opt").forEach(x=>x.classList.add("lock"));
      const correct=(o.v===ex.answer);
      b.classList.add(correct?"correct":"wrong");
      if(!correct){ const ci=labels.findIndex(L0=>L0.v===ex.answer); const cb=ui.querySelectorAll(".opt")[ci]; cb&&cb.classList.add("correct"); }
      lockAndAdvance(correct, o.t, (ex.answer?txt("yes"):txt("no")), ex);
    });
    ui.appendChild(b);
  });
}
function renderWordbank(ui, ex){
  ui.innerHTML=`<div class="assemble" id="asm" data-ph="${esc(txt("assemblePh"))}"></div>
    <div class="bank" id="bank"></div>
    <div class="btnrow"><button class="btn" id="wbCheck" disabled>${esc(txt("check"))}</button></div>`;
  const asm=$("asm"), bank=$("bank"), chk=$("wbCheck");
  const words=ex.answer.slice(), pool=shuffle(words.concat(ex.extra||[]));
  const chosen=[]; // {w, idx}
  pool.forEach((w,idx)=>{ const t=elFrom(`<button class="tile" data-idx="${idx}">${esc(w)}</button>`);
    t.addEventListener("click",()=>{ if(t.classList.contains("used")) return; t.classList.add("used");
      chosen.push({w, idx}); paint(); }); bank.appendChild(t); });
  function paint(){ asm.innerHTML=""; chosen.forEach((c,ci)=>{ const tt=elFrom(`<button class="tile">${esc(c.w)}</button>`);
      tt.addEventListener("click",()=>{ chosen.splice(ci,1); const src=bank.querySelector(`[data-idx="${c.idx}"]`); src&&src.classList.remove("used"); paint(); });
      asm.appendChild(tt); });
    chk.disabled = chosen.length!==words.length; }
  chk.addEventListener("click",()=>{ const got=chosen.map(c=>c.w);
    const correct=got.length===words.length && got.every((w,i)=>w===words[i]);
    bank.querySelectorAll(".tile").forEach(x=>x.classList.add("used")); chk.disabled=true; chk.style.display="none";
    asm.style.pointerEvents="none";
    asm.querySelectorAll(".tile").forEach((t,i)=>t.classList.add(got[i]===words[i]?"good":"bad"));
    lockAndAdvance(correct, got.join(" "), words.join(" "), ex); });
}
function renderClassify(ui, ex){
  const cats=ex.cats;
  ui.innerHTML=`<div class="cols">${cats.map((c,ci)=>`<div class="col" data-cat="${ci}"><h4>${esc(L(c,S.lang))}</h4><div class="drop" data-cat="${ci}"></div></div>`).join("")}</div>
    <div class="pool" id="pool"></div>
    <div class="btnrow"><button class="btn" id="clCheck" disabled>${esc(txt("check"))}</button></div>`;
  const pool=$("pool"), chk=$("clCheck"); let sel=null; const placed={}; // itemIdx -> catIdx
  ex.items.forEach((it,i)=>{ const c=elFrom(`<button class="chip" data-i="${i}">${esc(L(it.t,S.lang))}</button>`);
    c.addEventListener("click",()=>selectChip(c)); pool.appendChild(c); });
  function selectChip(c){ if(c.classList.contains("placed")){ // vrátit do poolu
      const i=c.getAttribute("data-i"); delete placed[i]; c.classList.remove("placed"); pool.appendChild(c); refresh(); return; }
    if(sel===c){ sel.classList.remove("sel"); sel=null; return; }
    if(sel) sel.classList.remove("sel"); sel=c; c.classList.add("sel"); }
  ui.querySelectorAll(".drop").forEach(d=>{ d.addEventListener("click",()=>{ if(!sel) return;
      const ci=+d.getAttribute("data-cat"), i=sel.getAttribute("data-i");
      placed[i]=ci; sel.classList.remove("sel"); sel.classList.add("placed"); d.appendChild(sel); sel=null; refresh(); }); });
  function refresh(){ chk.disabled = Object.keys(placed).length!==ex.items.length; }
  chk.addEventListener("click",()=>{ let ok=true; const detail=[];
    ex.items.forEach((it,i)=>{ const got=placed[i]; if(got!==it.c) ok=false;
      const chip=ui.querySelector(`.chip[data-i="${i}"]`); chip&&chip.classList.add(got===it.c?"good":"bad");
      detail.push(`${L(it.t,S.lang)} → ${L(cats[it.c],S.lang)}`); });
    ui.querySelectorAll(".chip").forEach(x=>x.style.pointerEvents="none"); chk.disabled=true; chk.style.display="none";
    lockAndAdvance(ok, ok?"✓":"—", detail.join("; "), ex); });
}

function injectSkip(ex){
  const host=$("exHost"); if(host.querySelector(".tskip")) return;
  const b=elFrom(`<button class="btn ghost tskip" style="margin-top:12px;font-size:12px">${esc(txt("skip"))} ⏭</button>`);
  b.addEventListener("click",()=>{ S.answers.push({scene:S.sceneIdx,ex:S.exIdx,type:ex.type,
    q:L(ex.q,S.lang),correct:false,your:"(přeskočeno)",right:"—"}); advance(); });
  host.appendChild(b);
}
/* znovuvykreslení aktuální obrazovky (po změně skinu/jazyka) */
function rerender(){
  if(S.finished) return renderResult();
  if(!S.started) return showStart();
  if(S.sceneIdx>=CONTENT.scenes.length) return renderAccusation();
  return renderScene();
}
function applySkin(){ document.body.setAttribute("data-skin", S.skin);
  document.title = L(skin().name,S.lang)+" · LUDUS";
  try{ Rain.glyphSet(); Rain.start(); }catch(e){} }

function toggleFS(){
  try{
    if(document.fullscreenElement||document.webkitFullscreenElement){
      (document.exitFullscreen||document.webkitExitFullscreen).call(document);
    }else{
      const el=document.documentElement;
      (el.requestFullscreen||el.webkitRequestFullscreen).call(el);
    }
  }catch(e){}
}
function wireTeacherTriple(){
  let n=0,t=0; $("brand").addEventListener("click",()=>{ const now=Date.now();
    if(now-t>600) n=0; t=now; n++; if(n>=3){ n=0; setTeacher(!window.__TEACHER); } });
  $("tbJump").addEventListener("change",e=>{ const v=e.target.value;
    if(v==="start"){ S.started=false; showStart(); return; }
    if(v==="accuse"){ S.started=true; renderAccusation(); return; }
    const i=+v.slice(1); S.started=true; S.finished=false; S.sceneIdx=i; S.exIdx=0;
    if(!S.max) S.max=totalExercises(); rerender(); });
  $("btnFS").addEventListener("click",toggleFS);
  $("tbAccuse").addEventListener("click",()=>{ S.started=true; renderAccusation(); });
  $("tbResult").addEventListener("click",()=>{ S.started=true; if(!S.max) S.max=totalExercises(); renderResult(); });
  $("tbReset").addEventListener("click",()=>{ clearSave(); S.testId=null; S.started=false; S.finished=false;
    S.sceneIdx=0; S.exIdx=0; S.answers=[]; S.clues=[]; S.accused=null; showStart(); });
}

window.LUDUS_LOAD=function(content){
  try{ CONTENT=normalizeContent(content); }catch(e){ return; }
  if(CONTENT.meta && CONTENT.meta.skin && SKINS[CONTENT.meta.skin]) S.skin=CONTENT.meta.skin;
  if(CONTENT.meta && CONTENT.meta.lang && I18N[CONTENT.meta.lang]) S.lang=CONTENT.meta.lang;
  clearSave(); S.testId=null; S.started=false; S.finished=false; S.sceneIdx=0; S.exIdx=0;
  S.score=0; S.max=totalExercises(); S.answers=[]; S.clues=[]; S.accused=null;
  document.documentElement.lang=S.lang; applySkin();
  if(window.__TEACHER){ buildJump(); refreshTeacherLabels(); }
  showStart();
};

   BOOT
   =========================================================================== */
function boot(){
  loadImages();
  try{ Rain.setup(); }catch(e){} addEventListener("resize",()=>{ try{ Rain.resize(); }catch(e){} });
  // skin + jazyk z metadat obsahu
  if(CONTENT.meta && CONTENT.meta.skin && SKINS[CONTENT.meta.skin]) S.skin=CONTENT.meta.skin;
  if(CONTENT.meta && CONTENT.meta.lang && I18N[CONTENT.meta.lang]) S.lang=CONTENT.meta.lang;
  document.documentElement.lang=S.lang; applySkin();
  S.max=totalExercises();

  // topbar
  $("btnSound").addEventListener("click",()=>setSound(!S.sound));
  setSound(loadSoundPref());
  $("btnBoard").addEventListener("click",()=>{ openBoard(); });
  $("boardClose").addEventListener("click",closeBoard);
  $("boardModal").addEventListener("click",e=>{ if(e.target===$("boardModal")) closeBoard(); });
  $("imgClose").addEventListener("click",closeImageManager);
  $("imgModal").addEventListener("click",e=>{ if(e.target===$("imgModal")) closeImageManager(); });
  $("btnMenu").addEventListener("click",()=>{ if(S.started&&!S.finished){
      if(confirm("Restartovat na úvod? Postup se ztratí.")){ clearSave(); S.started=false; S.finished=false;
        S.sceneIdx=0; S.exIdx=0; S.answers=[]; S.clues=[]; S.accused=null; S.testId=null; showStart(); }
    } else showStart(); });
  wireTeacherTriple();
  if(/[?&]teacher=1/.test(location.search)) setTeacher(true);

  // splash / intro  (intro video + znělka — base64 se vkládá do bloku INTRO nakonec)
  const sp=$("splash"), inner=$("splashInner"), vid=$("splashVideo"), skip=$("splashSkip");
  let jingle=null;
  if(INTRO.audioBase64){ try{ jingle=new Audio(INTRO.audioBase64); jingle.preload="auto"; }catch(e){} }
  function playJingle(){ if(!jingle) return; jingle.play().catch(()=>{}); }
  function stopJingle(){ if(!jingle) return; try{ jingle.pause(); jingle.currentTime=0; }catch(e){} }
  // pokud prohlížeč blokuje autoplay zvuku, spustí se při prvním doteku/kliknutí
  function gestureAudio(){ playJingle(); document.removeEventListener("pointerdown",gestureAudio); }
  document.addEventListener("pointerdown",gestureAudio,{once:true});

  function dismiss(){ if(sp.classList.contains("gone")) return; sp.classList.add("gone");
    try{ vid.pause(); }catch(e){} stopJingle(); setTimeout(()=>{ try{ sp.remove(); }catch(e){} },750); afterSplash(); }

  if(INTRO.videoBase64){ vid.src=INTRO.videoBase64; vid.style.display="block"; skip.classList.remove("hidden");
    vid.play().catch(()=>{}); vid.addEventListener("ended",dismiss); skip.addEventListener("click",dismiss);
    playJingle();
  } else {
    inner.innerHTML=`<div class="boot" id="spBoot"></div><div class="big" id="spName"></div><div class="sub">${esc(txt("enter"))}</div>`;
    playJingle();
    sp.addEventListener("click",dismiss);
    const reduced=matchMedia("(prefers-reduced-motion:reduce)").matches;
    const lines=(skin().bootLines && skin().bootLines[S.lang]) || [];
    const bootEl=$("spBoot"), nameEl=$("spName");
    function showName(){ revealText(nameEl, L(skin().name,S.lang), ()=>{
      if(INTRO.holdMs>0) setTimeout(dismiss, INTRO.holdMs); }); }
    if(reduced || !lines.length){ bootEl.textContent=lines.join("\n"); showName(); }
    else { // řádky se "napíšou" jako v terminálu, pak se dešifruje název
      let li=0, ci=0, buf="";
      const iv=window.__matrixBootInterval=setInterval(()=>{
        if(li>=lines.length){ clearInterval(iv); showName(); return; }
        ci++; bootEl.textContent=buf+lines[li].slice(0,ci)+(ci<lines[li].length?"▍":"");
        if(ci>=lines[li].length){ buf+=lines[li]+"\n"; li++; ci=0; }
      }, 22);
      sp.addEventListener("click",()=>clearInterval(iv),{once:true});
    }
  }

  // obnova rozehrané hry
  function afterSplash(){
    const sv=loadState();
    if(sv && sv.started){
      S.name=sv.name||""; S.sceneIdx=sv.sceneIdx||0; S.exIdx=sv.exIdx||0; S.score=sv.score||0;
      S.max=sv.max||totalExercises(); S.answers=sv.answers||[]; S.clues=sv.clues||[];
      S.accused=sv.accused||null; S.finished=!!sv.finished; S.started=true;
      updateBoardBtn();
      if(S.finished) renderResult();
      else if(S.sceneIdx>=CONTENT.scenes.length) renderAccusation();
      else renderScene();
    } else { showStart(); }
  }
  try{ Rain.start(); }catch(e){}
}
document.addEventListener("DOMContentLoaded", boot);
document.addEventListener("ludus:languagechange", e=>{
  const target=(e.detail&&e.detail.lang)==="en"?"en":"cs";
  S.lang=target;
  if(window.__matrixBootInterval){ clearInterval(window.__matrixBootInterval); window.__matrixBootInterval=null; }
  const bootEl=$("spBoot"), sub=document.querySelector("#splash .sub"), nameEl=$("spName");
  if(bootEl) bootEl.textContent=((skin().bootLines&&skin().bootLines[target])||[]).join("\n");
  if(sub) sub.textContent=txt("enter");
  if(nameEl) nameEl.textContent=L(skin().name,target);
});

<script>

var LUDUS_MEDIA = { introVideo:"", soundtrack:"", title:"Případ Simulakrum" };

(function(){
  var cfg = window.LUDUS_UNIFY || {};  /* hooks: getSound,setSound,save,reset,getLang,afterCine */
  var STR = {
    cs:{save:'Uložit hru',saved:'Uloženo ✓',noSave:'Zatím není co uložit',snd:'Zvuk zap/vyp',
        reset:'Restart — nová hra',resetQ:'Opravdu začít znovu? Postup bude smazán.',fs:'Celá obrazovka',
        enter:'✦\u00a0\u00a0Vstoupit\u00a0\u00a0✦',skip:'Přeskočit ⏭'},
    en:{save:'Save game',saved:'Saved ✓',noSave:'Nothing to save yet',snd:'Sound on/off',
        reset:'Restart — new game',resetQ:'Really start over? Progress will be erased.',fs:'Fullscreen',
        enter:'✦\u00a0\u00a0Enter\u00a0\u00a0✦',skip:'Skip ⏭'}
  };
  function lang(){ try{ var l=cfg.getLang?cfg.getLang():'cs'; return STR[l]?l:'cs'; }catch(e){ return 'cs'; } }
  function S(k){ return STR[lang()][k]; }
  var toastTm=null;
  function toast(msg){
    var t=document.getElementById('ludus-toast'); if(!t) return;
    t.textContent=msg; t.classList.add('on'); clearTimeout(toastTm);

  }
  window.__ludusToast = toast;
  function refreshLang(){
    var m={ 'ludus-save':'save','ludus-snd':'snd','ludus-reset':'reset','ludus-fs':'fs' };
    Object.keys(m).forEach(function(id){ var b=document.getElementById(id);
      if(b){ b.title=S(m[id]); b.setAttribute('aria-label',S(m[id])); } });
    var g=document.getElementById('ludus-cine-go'); if(g) g.textContent=S('enter');
    var sk=document.getElementById('ludus-cine-skip'); if(sk) sk.textContent=S('skip');
  }
  window.__ludusLayerLang = refreshLang;

  /* ---------- soundtrack ---------- */
  var st = document.getElementById('ludus-soundtrack');
  var stWanted = false;
  if(LUDUS_MEDIA.soundtrack){ st.src = LUDUS_MEDIA.soundtrack; stWanted = true; }
  function soundOn(){ try{ return cfg.getSound ? !!cfg.getSound() : !window.__ludusMuted; }catch(e){ return true; } }
  function stPlay(){ if(stWanted && soundOn()){ st.volume=.55; st.play().catch(function(){}); } }
  function stStop(){ try{ st.pause(); }catch(e){} }
  window.__ludusSoundtrack = { play:stPlay, stop:stStop };

  /* ---------- tlačítka ---------- */
  function setSound(on){
    try{ if(cfg.setSound) cfg.setSound(!!on); else window.__ludusMuted = !on; }catch(e){}

  var sndBtn=document.getElementById('ludus-snd');

  }
  var saveBtn=document.getElementById('ludus-save');

  var rstBtn=document.getElementById('ludus-reset');

  }

})();
