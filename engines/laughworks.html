<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#150b2e">
<title>Továrna na smích — LUDUS</title>
<style>
:root{
  --bg:#150b2e; --bg2:#1d1142; --panel:#241652; --panel2:#190f3c;
  --ink:#f4eeff; --muted:#b8a8de; --faint:#7e6cac;
  --lime:#aef84a; --cyan:#3fe0ff; --pink:#ff79c6; --amber:#ffb33c; --purple:#9b6bff;
  --scare:#ff4d6d; --ok:#9bf06a;
  --glass:rgba(180,200,255,.07); --edge:rgba(185,210,255,.26); --line:rgba(165,150,225,.16);
  --sans:'Segoe UI',Roboto,-apple-system,system-ui,'Helvetica Neue',Arial,sans-serif;
  --mono:'SFMono-Regular',ui-monospace,'DejaVu Sans Mono','Roboto Mono',Consolas,monospace;
  --r:20px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:var(--sans); color:var(--ink); min-height:100%;
  background:
    radial-gradient(1000px 620px at 82% -12%, rgba(63,224,255,.13), transparent 60%),
    radial-gradient(880px 600px at 8% 112%, rgba(155,107,255,.18), transparent 60%),
    radial-gradient(700px 500px at 50% 50%, rgba(174,248,74,.04), transparent 70%),
    linear-gradient(180deg,#150b2e 0%,#1c1040 52%,#120a28 100%);
  overflow-x:hidden;
}
.wrap{max-width:680px;margin:0 auto;padding:12px 14px 44px;position:relative;z-index:3}

/* ---------- top bar ---------- */
.topbar{display:flex;align-items:center;gap:10px;padding:4px 2px 8px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;flex:1;min-width:0}
.logo .mark{width:36px;height:36px;flex:none;border-radius:11px;position:relative;
  background:linear-gradient(140deg,var(--lime),var(--cyan));
  display:grid;place-items:center;box-shadow:0 0 18px rgba(174,248,74,.4)}
.logo .mark svg{width:23px;height:23px}
.logo .meta{min-width:0}
.logo .ku{font-family:var(--mono);font-size:9.5px;letter-spacing:.26em;color:var(--faint);text-transform:uppercase}
.logo .wn{font-weight:800;font-size:14.5px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctrls{display:flex;gap:8px;flex:none;align-items:center}
.tflag{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:#1a0f3e;
  background:var(--amber);padding:4px 9px;border-radius:20px;font-weight:800;display:none}
.tflag.on{display:inline-block}
.ctrl{width:40px;height:40px;flex:none;border:1px solid var(--line);border-radius:12px;cursor:pointer;
  background:var(--glass);color:var(--muted);display:grid;place-items:center;transition:.14s;backdrop-filter:blur(4px)}
.ctrl:hover{color:var(--ink);border-color:var(--edge);background:rgba(174,248,74,.10)}
.ctrl:active{transform:scale(.93)}
.ctrl svg{width:20px;height:20px}
.ctrl.off{color:var(--faint)}

/* ---------- canister rack strip ---------- */
.rackstrip{display:flex;align-items:center;gap:10px;margin:2px 2px 14px;
  padding:9px 13px;border:1px solid var(--line);border-radius:14px;
  background:linear-gradient(180deg,rgba(36,22,82,.6),rgba(25,15,60,.5))}
.rackstrip .rl{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;color:var(--faint);text-transform:uppercase;flex:none}
.rack{display:flex;gap:8px;align-items:flex-end;flex:1;min-width:0;overflow:hidden}
.can{width:20px;height:34px;flex:none}.can svg{display:block;width:100%;height:100%}
.rackstrip .rn{font-family:var(--mono);font-size:11px;color:var(--lime);flex:none;font-weight:600}

/* ---------- panel ---------- */
.panel{background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--line);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;
  box-shadow:0 22px 60px rgba(8,2,24,.55), inset 0 1px 0 rgba(255,255,255,.05)}
.panel::before{content:"";position:absolute;inset:0 0 auto 0;height:2px;
  background:linear-gradient(90deg,transparent,var(--lime),var(--cyan),transparent);opacity:.55}

/* ---------- hero ---------- */
.stage{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--edge);
  background:#0c0722;aspect-ratio:16/10;margin-bottom:16px;box-shadow:inset 0 0 60px rgba(0,0,0,.5)}
.stage .imgslot{position:absolute;inset:0}
.stage .imgslot img{width:100%;height:100%;object-fit:cover;animation:kb 28s ease-in-out infinite alternate}
.stage svg{position:absolute;inset:0;width:100%;height:100%}
.stage .vig{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(130% 100% at 50% 18%,transparent 42%,rgba(10,4,28,.72) 100%)}
@keyframes kb{from{transform:scale(1.03)}to{transform:scale(1.15) translate(-2%,-2%)}}

.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--lime);
  text-transform:uppercase;margin:0 0 8px}
h1.title{margin:0 0 7px;font-size:31px;line-height:1.02;letter-spacing:-.015em;font-weight:800}
.lede{color:var(--muted);font-size:14.5px;line-height:1.58;margin:0 0 18px}
.internal{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;
  letter-spacing:.12em;color:var(--scare);border:1px solid rgba(255,77,109,.4);
  background:rgba(255,77,109,.08);padding:4px 9px;border-radius:20px;margin-bottom:12px}

.field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.18em;
  color:var(--faint);text-transform:uppercase;margin:0 0 7px}
.input{width:100%;background:#120a2e;border:1px solid var(--line);border-radius:13px;
  color:var(--ink);font-size:16px;padding:14px;font-family:var(--sans);outline:none;transition:.15s}
.input:focus{border-color:var(--lime);box-shadow:0 0 0 3px rgba(174,248,74,.16)}

.btn{appearance:none;border:0;cursor:pointer;font-family:var(--sans);font-weight:800;
  border-radius:14px;padding:15px 18px;font-size:15.5px;width:100%;transition:transform .08s, filter .15s;
  background:linear-gradient(135deg,var(--lime),var(--cyan));color:#0d1804;letter-spacing:.01em;
  box-shadow:0 12px 30px rgba(174,248,74,.26)}
.btn:active{transform:translateY(1px) scale(.995)}
.btn:disabled{filter:grayscale(.6) brightness(.7);cursor:not-allowed;box-shadow:none}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);box-shadow:none;font-weight:700}
.btn.ghost:hover{color:var(--ink);border-color:var(--edge)}
.btnrow{display:flex;gap:10px;margin-top:15px}

/* ---------- experiment header ---------- */
.exphead{display:flex;align-items:center;gap:13px;margin-bottom:15px}
.exphead .canbig{width:78px;flex:none;filter:drop-shadow(0 6px 16px rgba(0,0,0,.4))}
.exphead .meta{min-width:0;flex:1}
.exphead .step{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase}
.exphead h2{margin:4px 0 0;font-size:19px;line-height:1.14;font-weight:800;display:flex;align-items:center;gap:8px}
.exphead h2 .dchip{width:14px;height:18px;border-radius:3px;flex:none;box-shadow:0 0 10px currentColor}
.progline{height:7px;border-radius:6px;background:rgba(160,150,225,.16);overflow:hidden;margin-top:10px;position:relative}
.progline i{display:block;height:100%;width:0;border-radius:6px;transition:width .55s cubic-bezier(.2,.8,.2,1)}

/* ---------- question ---------- */
.qcard{animation:rise .42s cubic-bezier(.2,.85,.25,1)}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.qtype{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;color:var(--faint);text-transform:uppercase;margin-bottom:10px}
.prompt{font-size:20px;line-height:1.42;font-weight:600;margin:0 0 16px}
.prompt .gap{display:inline-block;min-width:74px;border-bottom:2px dashed var(--cyan);margin:0 4px;color:var(--cyan);text-align:center;font-weight:800}
.opts{display:grid;gap:10px}.opts.two,.opts.cats{grid-template-columns:1fr 1fr}
.opt{appearance:none;text-align:left;cursor:pointer;border-radius:14px;padding:15px;font-size:16px;
  color:var(--ink);background:#170d3a;border:1px solid var(--line);transition:.13s;font-family:var(--sans);
  display:flex;align-items:center;gap:12px;line-height:1.35}
.opt:hover{border-color:var(--edge);background:#1d1148;transform:translateY(-1px)}
.opt .dot{width:10px;height:10px;border-radius:50%;background:var(--faint);flex:none;transition:.13s}
.opt:hover .dot{background:var(--lime);box-shadow:0 0 8px var(--lime)}
.opt.correct{border-color:var(--ok);background:rgba(155,240,106,.13);color:#e8ffd6}
.opt.correct .dot{background:var(--ok);box-shadow:0 0 12px var(--ok)}
.opt.wrong{border-color:var(--scare);background:rgba(255,77,109,.13);color:#ffd6de;animation:shake .36s}
.opt.wrong .dot{background:var(--scare)}
.opt.lock{pointer-events:none;opacity:.55}
@keyframes shake{0%,100%{transform:translateX(0)}18%{transform:translateX(-8px)}38%{transform:translateX(7px)}58%{transform:translateX(-5px)}78%{transform:translateX(3px)}}

.bank{display:flex;flex-wrap:wrap;gap:9px;margin-top:4px}
.chip{cursor:pointer;border-radius:12px;padding:12px 16px;font-size:15.5px;font-weight:700;
  background:#1a0f44;border:1px solid var(--edge);color:var(--ink);transition:.13s;font-family:var(--sans)}
.chip:hover{background:#23145a;transform:translateY(-2px)}
.chip.correct{border-color:var(--ok);background:rgba(155,240,106,.16);color:#e8ffd6}
.chip.wrong{border-color:var(--scare);background:rgba(255,77,109,.16);animation:shake .36s}
.chip.lock{opacity:.45;pointer-events:none}

.fb{margin-top:15px;border-radius:14px;padding:14px 16px;font-size:14px;line-height:1.5;display:none;animation:rise .3s}
.fb.show{display:block}
.fb.good{background:rgba(155,240,106,.10);border:1px solid rgba(155,240,106,.36);color:#d4f7bf}
.fb.bad{background:rgba(255,77,109,.10);border:1px solid rgba(255,77,109,.36);color:#ffcfd8}
.fb .h{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:5px;opacity:.9}

/* classify: the sorted word as a big centered chip */
.prompt.word{text-align:center;font-size:27px;font-weight:800;letter-spacing:.01em;
  padding:16px 12px;border:1px dashed var(--edge);border-radius:16px;background:rgba(180,200,255,.05)}

/* laugh burst particles on correct answer */
.burst{position:fixed;z-index:70;pointer-events:none;font-size:18px;will-change:transform,opacity;
  animation:burst .85s cubic-bezier(.2,.7,.3,1) forwards}
@keyframes burst{from{transform:translate(0,0) scale(1);opacity:1}
  to{transform:translate(var(--dx),var(--dy)) scale(.5) rotate(var(--rot));opacity:0}}

/* rack: current station canister pulses */
.can.cur svg{animation:curp 1.5s ease-in-out infinite;transform-origin:center bottom}
@keyframes curp{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* canister completion pop */
.canpop{animation:cpop .6s cubic-bezier(.2,1.4,.4,1)}
@keyframes cpop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}

.exphead{animation:rise .4s cubic-bezier(.2,.85,.25,1)}

/* ---------- synthesis ---------- */
.synthwrap{text-align:center}
.synthstage{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--edge);
  background:#0c0722;aspect-ratio:1/1;max-width:320px;margin:0 auto 16px;box-shadow:inset 0 0 60px rgba(0,0,0,.55)}
.synthstage .imgslot{position:absolute;inset:0}
.synthstage .imgslot img{width:100%;height:100%;object-fit:cover;animation:breathe 6s ease-in-out infinite}
.synthstage svg{position:absolute;inset:0;width:100%;height:100%}
@keyframes breathe{0%,100%{transform:scale(1.02);filter:brightness(.92)}50%{transform:scale(1.07);filter:brightness(1.14)}}

/* ---------- result ---------- */
.card{max-width:530px;margin:0 auto;border-radius:22px;overflow:hidden;border:1px solid var(--edge);
  background:linear-gradient(180deg,#26165a,#170d38);box-shadow:0 26px 66px rgba(6,1,20,.6)}
.card .top{padding:19px 20px 17px;display:flex;align-items:center;gap:15px;
  background:linear-gradient(135deg,rgba(174,248,74,.16),rgba(63,224,255,.12),rgba(155,107,255,.10));
  border-bottom:1px solid var(--line)}
.card .gradebadge{width:80px;height:80px;flex:none;border-radius:20px;display:grid;place-items:center;
  font-size:42px;font-weight:800;color:#0d1804;font-family:var(--mono);
  background:linear-gradient(135deg,var(--lime),var(--cyan));box-shadow:0 8px 24px rgba(174,248,74,.4)}
.card .gradebadge.g3{background:linear-gradient(135deg,var(--amber),#ff9a3c);color:#241405}
.card .gradebadge.g4{background:linear-gradient(135deg,#ff9a4c,var(--scare));color:#2a0a12}
.card .gradebadge.g5{background:linear-gradient(135deg,var(--scare),#d63a58);color:#fff}
.card .who .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;color:var(--faint);text-transform:uppercase}
.card .who h3{margin:3px 0 6px;font-size:22px;font-weight:800}
.card .who .pct{font-family:var(--mono);font-size:13px;color:var(--lime)}
.card .rows{padding:15px 20px 19px}
.card .row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;
  border-bottom:1px solid rgba(160,150,225,.10);font-size:13.5px}
.card .row:last-child{border-bottom:0}
.card .row .k{color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
.card .row .v{font-weight:700;font-family:var(--mono)}
.review{margin:18px auto 0;max-width:530px}
.review h4{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--faint);text-transform:uppercase;margin:0 0 11px;text-align:center}
.revrow{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:13px;
  background:#170d3a;border:1px solid var(--line);margin-bottom:8px}
.revrow .ic{width:12px;height:16px;border-radius:3px;flex:none;box-shadow:0 0 8px currentColor}
.revrow .nm{flex:1;font-size:14px;font-weight:600}
.revrow .sc{font-family:var(--mono);font-size:13px;color:var(--muted)}

/* ---------- teacher panel ---------- */
.scrim{position:fixed;inset:0;background:rgba(6,2,18,.68);backdrop-filter:blur(3px);z-index:40;display:none}
.scrim.on{display:block}
.tpanel{position:fixed;right:0;top:0;height:100%;width:min(390px,92vw);z-index:50;
  background:linear-gradient(180deg,#24155a,#150c34);border-left:1px solid var(--edge);
  transform:translateX(102%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
  overflow-y:auto;padding:20px 18px 44px;box-shadow:-22px 0 64px rgba(0,0,0,.55)}
.tpanel.on{transform:none}
.tpanel h3{margin:0 0 4px;font-size:17px;display:flex;align-items:center;gap:8px}
.tpanel .sub{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;color:var(--amber);text-transform:uppercase;margin:0 0 18px}
.tsec{margin-bottom:20px}
.tsec>.lab{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;color:var(--faint);text-transform:uppercase;margin:0 0 9px;display:block}
.jumpgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tbtn{cursor:pointer;border:1px solid var(--line);background:#1a0f44;color:var(--ink);border-radius:11px;
  padding:11px 12px;font-size:13px;font-family:var(--sans);text-align:left;transition:.12s;display:flex;align-items:center;gap:8px}
.tbtn:hover{border-color:var(--edge);background:#22145a}
.tbtn.live{border-color:var(--lime);color:var(--lime)}
.tbtn .dc{width:10px;height:13px;border-radius:2px;flex:none}
.toggle{display:flex;gap:7px;background:#120a2e;border:1px solid var(--line);border-radius:12px;padding:4px}
.toggle button{flex:1;cursor:pointer;border:0;background:transparent;color:var(--muted);padding:10px;border-radius:9px;
  font-size:13px;font-family:var(--sans);font-weight:700;transition:.12s}
.toggle button.on{background:linear-gradient(135deg,var(--lime),var(--cyan));color:#0d1804}
.toggle button.on.danger{background:linear-gradient(135deg,var(--scare),#d63a58);color:#fff}
.slot{border:1px solid var(--line);border-radius:13px;padding:11px;margin-bottom:9px;background:rgba(26,15,68,.55)}
.slot .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.slot .sh b{font-size:13px}.slot .sh .st{font-family:var(--mono);font-size:10px;color:var(--faint)}
.slot .prev{height:66px;border-radius:10px;background:#0c0722;border:1px dashed var(--line);overflow:hidden;display:grid;place-items:center;margin-bottom:9px}
.slot .prev img{width:100%;height:100%;object-fit:cover}
.slot .prev span{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.1em}
.slot .sbtns{display:flex;gap:7px}
.upbtn{flex:1;position:relative;overflow:hidden;cursor:pointer;text-align:center;border:1px solid var(--edge);
  background:#1a0f44;color:var(--ink);border-radius:10px;padding:9px;font-size:12px;font-weight:700}
.upbtn input{position:absolute;inset:0;opacity:0;cursor:pointer}
.clr{cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--faint);border-radius:10px;padding:9px 12px;font-size:12px}
.clr:hover{color:var(--scare);border-color:var(--scare)}
.skipbtn{margin-top:9px;width:100%;cursor:pointer;border:1px dashed var(--amber);background:rgba(255,179,60,.08);
  color:var(--amber);border-radius:11px;padding:11px;font-size:13px;font-weight:800;font-family:var(--sans)}
.note{font-size:11.5px;color:var(--faint);line-height:1.55;margin-top:6px}

/* ---------- ambient: floating eyes + spores ---------- */
.amb{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.amb .sp{position:absolute;bottom:-14px;border-radius:50%;filter:blur(.4px);animation:float linear infinite;opacity:0}
@keyframes float{0%{transform:translateY(0) translateX(0);opacity:0}12%{opacity:.5}88%{opacity:.4}100%{transform:translateY(-106vh) translateX(20px);opacity:0}}
.amb .eye{position:absolute;animation:blinkpos 9s ease-in-out infinite;opacity:.0}
@keyframes blinkpos{0%,100%{opacity:0}10%,90%{opacity:.32}}
.blink{transform-origin:center;animation:bk 4.5s ease-in-out infinite}
@keyframes bk{0%,46%,52%,100%{transform:scaleY(1)}49%{transform:scaleY(.1)}}

@media (max-width:430px){
  h1.title{font-size:26px}.prompt{font-size:18px}
  .opts.two,.opts.cats{grid-template-columns:1fr}
  .exphead .canbig{width:64px}
  .logo .wn{font-size:13px}
}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.05ms!important}}
:focus-visible{outline:2px solid var(--lime);outline-offset:2px}
</style>
<style>
#sound,#fs{display:none!important} /* nahrazeno jednotným LUDUS ovládáním vpravo nahoře */
.topbar{padding-right:200px}
@media (max-width:560px){.topbar{padding-right:170px}}
</style>
</head>
<body>
<div class="amb" id="amb" aria-hidden="true"></div>
<div class="wrap">
  <div class="topbar">
    <div class="logo" id="logo" title="LUDUS">
      <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M4 11a8 8 0 0 1 16 0v3.5a3.5 3.5 0 0 1-3.5 3.5H16M4 11v3.5A3.5 3.5 0 0 0 7.5 18H8" stroke="#0d1804" stroke-width="2" stroke-linecap="round"/><circle cx="9" cy="11" r="1.6" fill="#0d1804"/><circle cx="15" cy="11" r="1.6" fill="#0d1804"/><path d="M9 15.5q3 2 6 0" stroke="#0d1804" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg></div>
      <div class="meta"><div class="ku">LUDUS · hra</div><div class="wn" id="worldname">Továrna na smích</div></div>
    </div>
    <span class="tflag" id="tflag">UČITEL</span>
    <div class="ctrls">
      <button class="ctrl" id="sound" aria-label="Zvuk" title="Zvuk"></button>
      <button class="ctrl" id="fs" aria-label="Celá obrazovka" title="Celá obrazovka"></button>
    </div>
  </div>
  <div class="rackstrip">
    <span class="rl">kanystry</span>
    <div class="rack" id="rack" aria-hidden="true"></div>
    <span class="rn" id="racknum">0/0</span>
  </div>
  <div id="screen"></div>
</div>

<div class="scrim" id="scrim"></div>
<aside class="tpanel" id="tpanel" aria-label="Učitelský panel"></aside>

<script>
"use strict";
/* ====================================================================
   LUDUS ENGINE · PŘÍŠERKY S.R.O. / TOVÁRNA NA SMÍCH
   codename: laughworks:factory  ·  mechanic: laboratory (doors+canisters)
   single-file · offline · Dialect A · dual-skin · CZ grading
   ==================================================================== */

/* ---------- DEFAULT CONTENT (LUDUS_CONTENT v2, Dialect A) ---------- */
const DEFAULT_LUDUS_CONTENT = {
  meta:{
    subject:"Angličtina · gramatika",
    skin:"bezpečná",
    colors:["#3fe0ff","#ff79c6","#aef84a","#ffb33c","#9b6bff"]
  },

/* ---------- DIALECT COERCION (__ludusCoerceV2) ---------- */
function __ludusCoerceV2(raw){
  raw=raw||{};
  const meta=raw.meta||{};
  const colors=(meta.colors&&meta.colors.length)?meta.colors:["#3fe0ff","#ff79c6","#aef84a","#ffb33c","#9b6bff"];
  let srcStations=raw.stations||raw.rooms||raw.levels||raw.doors||[];
  function coerceStation(st,i){
    st=st||{};
    const name=st.name||st.title||st.label||("Dveře "+(i+1));
    let ex=st.exercise||st.ex||{};
    if(!ex.qs&&Array.isArray(st.questions)) ex={type:st.type||"mc4",qs:st.questions};
    let type=(ex.type||"mc4").toLowerCase();
    const tm={choice:"mc4",multichoice:"mc4",truefalse:"yesno",tf:"yesno",gapfill:"wordbank",fill:"wordbank",sort:"classify",match:"classify"};
    type=tm[type]||type; if(!["mc4","mc2","yesno","wordbank","classify"].includes(type)) type="mc4";
    let qs=Array.isArray(ex.qs)?ex.qs:(Array.isArray(ex.questions)?ex.questions:[]);
    qs=qs.map(q=>{ q=q||{};
      const out={q:(q.q||q.prompt||q.text||"").toString(),why:(q.why||q.explain||q.exp||"").toString()};
      let opts=q.opts||q.options||q.choices; if(Array.isArray(opts)) out.opts=opts.map(String);
      let a=(q.a!==undefined)?q.a:(q.correct!==undefined?q.correct:q.answer);
      if(typeof a==="string"&&out.opts){const idx=out.opts.indexOf(a);if(idx>=0)a=idx;}
      out.a=a; return out; });
    return {name,exercise:{type,qs,bank:(ex.bank||[]).map(String),cats:(ex.cats||ex.categories||[]).map(String)}};
  }
  const stations=srcStations.map(coerceStation);
  let finale=raw.finale||raw.boss||null; if(finale) finale=coerceStation(finale,stations.length);
  return { meta:{ subject:meta.subject||raw.subject||"", skin:meta.skin||"bezpečná", colors }, stations, finale };
}

/* ---------- AUDIO ---------- */
const AudioFX=(()=>{
  let ctx=null;
  function ac(){ try{ ctx=ctx||new (window.AudioContext||window.webkitAudioContext)(); if(ctx.state==="suspended")ctx.resume(); }catch(e){ctx=null;} return ctx; }
  function tone(f,dur,type,g,when){ if(AudioFX.muted)return; const c=ac(); if(!c)return; const t=c.currentTime+(when||0);
    const o=c.createOscillator(),v=c.createGain(); o.type=type||"sine"; o.frequency.setValueAtTime(f,t);
    v.gain.setValueAtTime(0,t); v.gain.linearRampToValueAtTime(g||.13,t+.012); v.gain.exponentialRampToValueAtTime(.0008,t+dur);
    o.connect(v); v.connect(c.destination); o.start(t); o.stop(t+dur+.02); }
  function slide(f1,f2,dur,type,g){ if(AudioFX.muted)return; const c=ac(); if(!c)return; const t=c.currentTime;
    const o=c.createOscillator(),v=c.createGain(); o.type=type||"sine"; o.frequency.setValueAtTime(f1,t); o.frequency.exponentialRampToValueAtTime(f2,t+dur);
    v.gain.setValueAtTime(g||.12,t); v.gain.exponentialRampToValueAtTime(.0008,t+dur); o.connect(v); v.connect(c.destination); o.start(t); o.stop(t+dur+.02); }
  return { muted:false,
    tap(){ tone(480,.05,"sine",.05); },
    correct(){ tone(587,.10,"triangle",.12); tone(880,.13,"triangle",.10,.07); tone(1175,.16,"sine",.07,.14); }, // bright laugh
    wrong(){ tone(196,.18,"sawtooth",.10); tone(140,.24,"sawtooth",.08,.06); },                                 // scare
    complete(){ [523,659,784,1046,1318].forEach((f,i)=>tone(f,.26,"triangle",.10,i*.08)); },
    door(){ slide(140,90,.5,"sine",.08); tone(220,.2,"triangle",.05,.12); },
    surge(){ slide(160,840,1.2,"sawtooth",.10); tone(1046,.6,"triangle",.08,1.0); },
    win(){ [392,523,659,784,1046,1318].forEach((f,i)=>tone(f,.42,"triangle",.12,i*.11)); } };
})();

    const cv=document.createElement("canvas"); cv.width=w; cv.height=h; cv.getContext("2d").drawImage(img,0,0,w,h);

    if(type==="mc4"||type==="mc2") out.push({type,prompt:esc(q.q),why:q.why,options:shuffled((q.opts||[]).map((o,i)=>({label:esc(o),id:i}))),correctId:q.a});
    else if(type==="yesno") out.push({type,prompt:esc(q.q),why:q.why,options:[{label:T("true_"),id:0},{label:T("false_"),id:1}],correctId:(q.a===true||q.a===0||q.a==="true")?0:1});

  return out;
}

/* synthesis power surge, progress 0..1 */
function synthSVG(progress){
  progress=Math.max(0,Math.min(1,progress));
  const cols=DATA.meta.colors; const glow=.3+progress*.7;
  const feeds=cols.slice(0,5).map((c,i)=>{ const a=(-160+i*55)*Math.PI/180; const x=150+Math.cos(a)*116, y=110+Math.sin(a)*70;
    return `<line x1="${x.toFixed(0)}" y1="${(y+14).toFixed(0)}" x2="150" y2="150" stroke="${c}" stroke-width="1.6" stroke-opacity="${(.15+progress*.55).toFixed(2)}" stroke-dasharray="4 5" class="fl"/>
      <g transform="translate(${(x-10).toFixed(0)},${(y-18).toFixed(0)}) scale(.8)">${canMiniShape(true,c)}</g>`; }).join("");
  return `<svg viewBox="0 0 300 300">
    <defs><radialGradient id="sc" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#fff" stop-opacity="${glow}"/><stop offset=".35" stop-color="#aef84a" stop-opacity="${(glow*.85).toFixed(2)}"/><stop offset=".7" stop-color="#3fe0ff" stop-opacity="${(glow*.4).toFixed(2)}"/><stop offset="1" stop-color="#9b6bff" stop-opacity="0"/></radialGradient></defs>
    <rect width="300" height="300" fill="#0c0722"/>
    <g transform="translate(0,40)">${skyline(300,progress,300)}</g>
    ${feeds}
    <circle cx="150" cy="150" r="${50+progress*24}" fill="url(#sc)" class="scp"/>
    <circle cx="150" cy="150" r="38" fill="#150e36" stroke="#aef84a" stroke-width="2.5"/>
    <circle cx="150" cy="150" r="${16+progress*16}" fill="#aef84a" opacity="${(.5+progress*.5).toFixed(2)}" class="scp"/>
    <circle cx="150" cy="150" r="38" fill="none" stroke="#3fe0ff" stroke-width="3" stroke-dasharray="${(progress*239).toFixed(0)} 239" transform="rotate(-90 150 150)" stroke-linecap="round"/>
    <style>.scp{transform-origin:150px 150px;animation:scz 2.4s ease-in-out infinite}@keyframes scz{0%,100%{transform:scale(.97)}50%{transform:scale(1.05)}}.fl{animation:flz 1.1s linear infinite}@keyframes flz{to{stroke-dashoffset:-18}}.winlit{}</style>
  </svg>`;
}

/* ---------- GAME FLOW ---------- */
function startGame(){
  state.seq=DATA.stations.slice(); if(DATA.finale) state.seq.push(Object.assign({__finale:true},DATA.finale));
  state.total=state.seq.reduce((n,st)=>n+buildSteps(st).length,0);
  state.correct=0; state.seen=new Set(); state.solved=new Set(); state.perStation=[]; state.idx=0; state.synthStarted=false;
  state.testId=(SKIN().key==="original"?"PSR":"TNS")+"-"+Date.now().toString(36).slice(-4).toUpperCase()+"-"+Math.floor(Math.random()*900+100);
  state.startedAt=new Date();
  enterStation(0);
}
function enterStation(i){ setTimeout(()=>{ try{ if(state.screen!=="intro") saveGame(); }catch(e){} },0);
  state.idx=i; const st=state.seq[i];
  state.steps=buildSteps(st); state.queue=state.steps.map((_,k)=>k);
  state.perStation[i]={name:st.name,correct:0,total:state.steps.length,finale:!!st.__finale};
  state.picked=false; state.synthStarted=false;
  state.screen=st.__finale?"synthesis":"experiment";
  if(!st.__finale) AudioFX.door();
  render();
}
function curStep(){ return state.steps[state.queue[0]]; }
function solvedInStation(){ let n=0; state.steps.forEach((_,k)=>{ if(state.solved.has("s"+state.idx+"-"+k))n++; }); return n; }

/* ---------- EXPERIMENT (a door) ---------- */
function screenExperiment(){
  const st=state.seq[state.idx]; const color=stationColor(state.idx);
  const fill=solvedInStation()/(state.steps.length||1); const step=curStep();
  $("#screen").innerHTML=`
  <div class="panel">
    <div class="exphead">
      <div class="canbig">${canisterSVG(fill,color)}</div>
      <div class="meta">
        <div class="step" style="color:${color}">${T("door")} ${state.idx+1} ${T("of")} ${state.seq.length}</div>
        <h2><span class="dchip" style="background:${color};color:${color}"></span>${esc(st.name)}</h2>
        <div class="progline"><i style="width:${(fill*100).toFixed(0)}%;background:linear-gradient(90deg,${color},#fff)"></i></div>
      </div>
    </div>
    <div id="qhost"></div>
  </div>`;
  renderStep(step,color);
}
function typeLabel(t){ return ({mc4:"výběr ze 4",mc2:"volba",yesno:"pravda / nepravda",wordbank:"doplň z banku",classify:"roztřiď"})[t]||t; }

function renderStep(step,color){
  const host=$("#qhost"); if(!host||!step)return; let body="";
  if(step.type==="wordbank"){
    body=`<div class="bank" id="bank">${shuffled(step.bank).map(w=>`<button class="chip" data-w="${esc(w)}">${esc(w)}</button>`).join("")}</div>`;
  }else{
    const two=step.options.length===2; const cls=step.classify?"opts cats":(two?"opts two":"opts");
    body=`<div class="${cls}">${step.options.map(o=>`<button class="opt" data-id="${o.id}"><span class="dot"></span><span>${o.label}</span></button>`).join("")}</div>`;
  }
  host.innerHTML=`<div class="qcard"><div class="qtype">${typeLabel(step.type)}</div>
    <p class="prompt${step.classify?' word':''}">${step.prompt}</p>${body}
    <div class="fb" id="fb"></div>
    <div class="btnrow" id="controw" style="display:none"><button class="btn" id="cont">${T("cont")}</button></div></div>`;
  if(step.type==="wordbank"){
    host.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{ if(state.picked)return; judge(step,c.dataset.w===step.correctWord,c,color); }));
  }else{
    host.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>{ if(state.picked)return; judge(step,parseInt(b.dataset.id,10)===step.correctId,b,color); }));
  }
}
function judge(step,ok,el,color){
  state.picked=true; const key="s"+state.idx+"-"+state.queue[0];
  if(!state.seen.has(key)){ state.seen.add(key); if(ok){ state.correct++; state.perStation[state.idx].correct++; } }
  const host=$("#qhost"); host.querySelectorAll(".opt,.chip").forEach(n=>n.classList.add("lock"));
  if(step.type==="wordbank"){ host.querySelectorAll(".chip").forEach(c=>{ if(c.dataset.w===step.correctWord)c.classList.add("correct"); }); }
  else{ host.querySelectorAll(".opt").forEach(o=>{ if(parseInt(o.dataset.id,10)===step.correctId)o.classList.add("correct"); }); }
  if(!ok&&el)el.classList.add("wrong");
  const fb=$("#fb"); fb.className="fb show "+(ok?"good":"bad");
  fb.innerHTML=`<span class="h">${ok?"😄 "+T("goodH"):"😱 "+T("badH")}</span>${step.why?esc(step.why):(ok?"✓":"✗")}`;
  if(ok){ AudioFX.correct(); state.solved.add(key); state.queue.shift(); laughBurst(el); }
  else{ AudioFX.wrong(); flashScare(); const q=state.queue.shift(); state.queue.push(q); }
  const fillEl=document.querySelector(".progline i"); const fl=solvedInStation()/(state.steps.length||1);
  if(fillEl) fillEl.style.width=(fl*100).toFixed(0)+"%";
  // live-update canister
  const cb=document.querySelector(".canbig"); if(cb) cb.innerHTML=canisterSVG(fl,color);
  renderRack();
  $("#controw").style.display="flex"; const cont=$("#cont"); cont.textContent=ok?T("cont"):T("retry"); cont.focus();
  cont.addEventListener("click",()=>{ AudioFX.tap(); afterStep(color); });
}
function afterStep(color){
  state.picked=false;
  if(state.queue.length===0){
    state.solved.add("st"+state.idx); renderRack(); AudioFX.complete();
    canisterIsolated(()=>{ if(state.idx+1<state.seq.length) enterStation(state.idx+1); else finishGame(); });
  }else screenExperiment();
}
function canisterIsolated(next){
  const color=stationColor(state.idx);
  let rackh=""; for(let i=0;i<DATA.stations.length;i++) rackh+=`<div class="can" style="width:24px;height:40px">${canMiniSVG(state.solved.has("st"+i),stationColor(i))}</div>`;
  $("#screen").innerHTML=`<div class="panel" style="text-align:center">
    <div class="canpop" style="width:96px;margin:6px auto 8px">${canisterSVG(1,color)}</div>
    <p class="eyebrow" style="color:${color}">${T("canDone")}</p>
    <h1 class="title" style="font-size:23px">${esc(state.seq[state.idx].name)}</h1>
    <div class="rack" style="justify-content:center;gap:9px;margin:16px 0 18px;overflow:visible">${rackh}</div>
    <button class="btn" id="nx">${T("cont")}</button></div>`;
  $("#nx").addEventListener("click",()=>{ AudioFX.tap(); next(); });
}
function flashScare(){ const p=document.querySelector(".panel"); if(p&&p.animate) p.animate([{boxShadow:"0 0 0 0 rgba(255,77,109,0)"},{boxShadow:"0 0 0 3px rgba(255,77,109,.55)"},{boxShadow:"0 0 0 0 rgba(255,77,109,0)"}],{duration:420}); }
function laughBurst(el){
  try{
    if(window.matchMedia&&matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    if(!el||!el.getBoundingClientRect) return;
    const r=el.getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2;
    const glyphs=["✨","😄","⚡","✦","😆"];
    for(let i=0;i<6;i++){
      const s=document.createElement("span"); s.className="burst"; s.textContent=glyphs[i%glyphs.length];
      const ang=(-90+(Math.random()*140-70))*Math.PI/180, dist=46+Math.random()*44;
      s.style.left=cx+"px"; s.style.top=cy+"px";
      s.style.setProperty("--dx",(Math.cos(ang)*dist).toFixed(0)+"px");
      s.style.setProperty("--dy",(Math.sin(ang)*dist).toFixed(0)+"px");
      s.style.setProperty("--rot",(Math.random()*80-40).toFixed(0)+"deg");
      document.body.appendChild(s); setTimeout(()=>s.remove(),900);
    }
  }catch(e){}
}

function screenSynthesis(){
  const st=state.seq[state.idx]; const disc=getImg("discovery"); const prog=solvedInStation()/(state.steps.length||1);
  $("#screen").innerHTML=`<div class="panel synthwrap">
    <div class="synthstage"><div class="imgslot">${disc?`<img src="${disc}" alt="">`:""}</div>${synthSVG(prog)}</div>
    <p class="eyebrow" style="color:var(--purple)">${T("synth")}</p>

    <div id="qhost"></div>
    ${state.synthStarted?"":`<div class="btnrow"><button class="btn" id="begin">${T("finish")}</button></div>`}</div>`;
  if(!state.synthStarted){ $("#begin").addEventListener("click",()=>{ AudioFX.surge(); state.synthStarted=true; screenSynthesis(); }); }
  else{ $("#slede").style.display="none"; renderStepSynth(curStep()); }
}
function renderStepSynth(step){
  const host=$("#qhost"); if(!host||!step)return; const two=step.options&&step.options.length===2;
  host.innerHTML=`<div class="qcard"><div class="qtype">${typeLabel(step.type)}</div>
    <p class="prompt" style="font-size:18px">${step.prompt}</p>
    <div class="opts ${two?'two':''}">${step.options.map(o=>`<button class="opt" data-id="${o.id}"><span class="dot"></span><span>${o.label}</span></button>`).join("")}</div>
    <div class="fb" id="fb"></div>
    <div class="btnrow" id="controw" style="display:none"><button class="btn" id="cont">${T("cont")}</button></div></div>`;
  host.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>{ if(state.picked)return; judgeSynth(step,parseInt(b.dataset.id,10)===step.correctId,b); }));
}
function judgeSynth(step,ok,el){
  state.picked=true; const key="s"+state.idx+"-"+state.queue[0];
  if(!state.seen.has(key)){ state.seen.add(key); if(ok){ state.correct++; state.perStation[state.idx].correct++; } }
  const host=$("#qhost"); host.querySelectorAll(".opt").forEach(o=>{ o.classList.add("lock"); if(parseInt(o.dataset.id,10)===step.correctId)o.classList.add("correct"); });
  if(!ok&&el)el.classList.add("wrong");
  const fb=$("#fb"); fb.className="fb show "+(ok?"good":"bad"); fb.innerHTML=`<span class="h">${ok?"😄 "+T("goodH"):"😱 "+T("badH")}</span>${step.why?esc(step.why):""}`;
  if(ok){ AudioFX.correct(); state.solved.add(key); state.queue.shift(); } else{ AudioFX.wrong(); const q=state.queue.shift(); state.queue.push(q); }
  const stage=document.querySelector(".synthstage"); if(stage){ const p=solvedInStation()/(state.steps.length||1);
    stage.innerHTML=`<div class="imgslot">${getImg("discovery")?`<img src="${getImg("discovery")}" alt="">`:""}</div>${synthSVG(p)}`; }
  $("#controw").style.display="flex"; const cont=$("#cont"); cont.textContent=ok?T("cont"):T("retry"); cont.focus();
  cont.addEventListener("click",()=>{ AudioFX.tap(); state.picked=false;
    if(state.queue.length===0){ AudioFX.win(); finishGame(); } else screenSynthesis(); });
}

/* ---------- RESULT (pay slip) ---------- */
function finishGame(){ state.synthStarted=false; state.screen="result"; render(); }
function screenResult(){

    <div class="tsec"><span class="lab">${T("jump")}</span>

      <p class="note">Nahráváš z galerie telefonu. Obrázek se zmenší a uloží do prohlížeče; engine ho animuje (Ken Burns / dýchání). SVG zůstává jako záloha.</p></div>
    <button class="btn ghost" id="tclose">${T("close")}</button>`;
  $("#tpanel").querySelectorAll("[data-lang]").forEach(b=>b.addEventListener("click",()=>{ state.lang=b.dataset.lang; DATA=__ludusCoerceV2(LUDUS_CONTENT); buildTeacherPanel(); render(); }));

}
function teacherJump(to){
  if(state.seq.length===0){ state.seq=DATA.stations.slice(); if(DATA.finale) state.seq.push(Object.assign({__finale:true},DATA.finale));
    state.total=state.seq.reduce((n,st)=>n+buildSteps(st).length,0); state.testId=state.testId||"PREVIEW"; state.startedAt=state.startedAt||new Date(); }
  if(to==="intro"){ state.screen="intro"; render(); }
  else if(to==="res"){ state.screen="result"; render(); }
  else if(to==="fin"){ state.synthStarted=false; enterStation(state.seq.length-1); }
  else if(to.startsWith("st")){ enterStation(parseInt(to.slice(2),10)); }
  buildTeacherPanel(); /* skok panel nezavírá — sekce se ukáže hned vedle */
}
function teacherSkip(){
  state.steps.forEach((_,k)=>state.solved.add("s"+state.idx+"-"+k)); state.solved.add("st"+state.idx);
  state.queue=[]; state.picked=false; state.synthStarted=false;
  if(state.idx+1<state.seq.length) enterStation(state.idx+1); else finishGame(); buildTeacherPanel();
}

document.addEventListener("keydown",e=>{

});

/* ---------- AMBIENT ---------- */
(function(){ const amb=$("#amb"); const cols=["174,248,74","63,224,255","155,107,255","255,179,60"]; let h="";
  for(let i=0;i<16;i++){ const l=Math.random()*100,d=8+Math.random()*10,dl=Math.random()*12,sz=3+Math.random()*5,c=cols[i%cols.length];

<script>
/* ═══ LUDUS MEDIA — sem se vkládají base64 média (dodá Daniel) ═══
   introVideo : "data:video/mp4;base64,...."   intro klip (prázdné = intro se přeskočí)
   soundtrack : "data:audio/mpeg;base64,...."  hudební smyčka (prázdné = jen WebAudio SFX) */
var LUDUS_MEDIA = { introVideo:"", soundtrack:"", title:"Továrna na smích" };

(function(){
  var cfg = window.LUDUS_UNIFY || {};  /* hooks: getSound,setSound,save,reset,getLang,afterCine */
  var STR = {
    cs:{save:'Uložit hru',saved:'Uloženo ✓',noSave:'Zatím není co uložit',snd:'Zvuk zap/vyp',
        reset:'Restart — nová hra',resetQ:'Opravdu začít znovu? Postup bude smazán.',fs:'Celá obrazovka',
        enter:'✦\u00a0\u00a0Vstoupit\u00a0\u00a0✦',skip:'Přeskočit ⏭'},
    en:{save:'Save game',saved:'Saved ✓',noSave:'Nothing to save yet',snd:'Sound on/off',
        reset:'Restart — new game',resetQ:'Really start over? Progress will be erased.',fs:'Fullscreen',
        enter:'✦\u00a0\u00a0Enter\u00a0\u00a0✦',skip:'Skip ⏭'}
  };
  function lang(){ try{ var l=cfg.getLang?cfg.getLang():'cs'; return STR[l]?l:'cs'; }catch(e){ return 'cs'; } }
  function S(k){ return STR[lang()][k]; }
  var toastTm=null;
  function toast(msg){
    var t=document.getElementById('ludus-toast'); if(!t) return;
    t.textContent=msg; t.classList.add('on'); clearTimeout(toastTm);
    toastTm=setTimeout(function(){ t.classList.remove('on'); },1800);
  }
  window.__ludusToast = toast;
  function refreshLang(){
    var m={ 'ludus-save':'save','ludus-snd':'snd','ludus-reset':'reset','ludus-fs':'fs' };
    Object.keys(m).forEach(function(id){ var b=document.getElementById(id);
      if(b){ b.title=S(m[id]); b.setAttribute('aria-label',S(m[id])); } });
    var g=document.getElementById('ludus-cine-go'); if(g) g.textContent=S('enter');
    var sk=document.getElementById('ludus-cine-skip'); if(sk) sk.textContent=S('skip');
  }
  window.__ludusLayerLang = refreshLang;

  /* ---------- soundtrack ---------- */
  var st = document.getElementById('ludus-soundtrack');
  var stWanted = false;
  if(LUDUS_MEDIA.soundtrack){ st.src = LUDUS_MEDIA.soundtrack; stWanted = true; }
  function soundOn(){ try{ return cfg.getSound ? !!cfg.getSound() : !window.__ludusMuted; }catch(e){ return true; } }
  function stPlay(){ if(stWanted && soundOn()){ st.volume=.55; st.play().catch(function(){}); } }
  function stStop(){ try{ st.pause(); }catch(e){} }
  window.__ludusSoundtrack = { play:stPlay, stop:stStop };

  /* ---------- tlačítka ---------- */
  function setSound(on){
    try{ if(cfg.setSound) cfg.setSound(!!on); else window.__ludusMuted = !on; }catch(e){}
    var b=document.getElementById('ludus-snd'); if(b) b.textContent = on ? '\uD83D\uDD0A' : '\uD83D\uDD07';
    if(on) stPlay(); else stStop();
  }
  var sndBtn=document.getElementById('ludus-snd');
  if(sndBtn){
    sndBtn.addEventListener('click', function(){ setSound(!soundOn()); });
    sndBtn.textContent = soundOn() ? '\uD83D\uDD0A' : '\uD83D\uDD07';
  }
  var saveBtn=document.getElementById('ludus-save');
  if(saveBtn) saveBtn.addEventListener('click', function(){
    var ok=false;
    try{ ok = cfg.save ? cfg.save()!==false : false; }catch(e){ ok=false; }
    toast(ok ? S('saved') : S('noSave'));
  });
  var rstBtn=document.getElementById('ludus-reset');
  if(rstBtn) rstBtn.addEventListener('click', function(){
    if(!cfg.reset) return;
    try{
      if(cfg.resetConfirms){ cfg.reset(); }           /* hra si potvrzení řeší sama */
      else if(confirm(S('resetQ'))){ cfg.reset(); }
    }catch(e){}
  });
  var fsBtn=document.getElementById('ludus-fs');
  if(fsBtn) fsBtn.addEventListener('click', function(){
    try{
      if(document.fullscreenElement || document.webkitFullscreenElement){
        (document.exitFullscreen||document.webkitExitFullscreen).call(document);
      }else{
        var el=document.documentElement;
        (el.requestFullscreen||el.webkitRequestFullscreen).call(el);
      }
    }catch(e){}
  });

  /* ---------- kinematické intro ---------- */
  var cine=document.getElementById('ludus-cine'), vid=document.getElementById('ludus-cine-vid');
  function cineEnd(){
    cine.style.opacity='0';
    setTimeout(function(){ cine.hidden=true; try{vid.pause();}catch(e){} }, 900);
    stPlay();
    if(cfg.afterCine){ try{ cfg.afterCine(); }catch(e){} }
  }

    });
    vid.addEventListener('ended', cineEnd);
    document.getElementById('ludus-cine-skip').addEventListener('click', cineEnd);
  } else if(stWanted){
    var once=function(){ stPlay(); document.removeEventListener('pointerdown', once); };
    document.addEventListener('pointerdown', once);
  }
  refreshLang();
})();
